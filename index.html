  });
  // Edit activity from gantt sub-row
  $$('.gantt-sub-row [data-edit]').forEach(el => el.onclick = () => {
    const a = S.activities[el.dataset.edit]; if (!a) return;
    S.view = 'kanban'; S.modal = activityModal(a); render();
  });
  // Drag and drop reorder milestones
  let dragId = null;
  $$('[data-mile-drag]').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragId = row.dataset.mileDrag;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragId);
    });
    row.addEventListener('dragend', () => {
      dragId = null;
      row.classList.remove('dragging');
      $$('.drag-over-top,.drag-over-bottom').forEach(el => { el.classList.remove('drag-over-top','drag-over-bottom'); });
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragId || row.dataset.mileDrag === dragId) return;
      e.dataTransfer.dropEffect = 'move';
      $$('.drag-over-top,.drag-over-bottom').forEach(el => { el.classList.remove('drag-over-top','drag-over-bottom'); });
      const rect = row.getBoundingClientRect();
      const half = (e.clientY - rect.top) / rect.height < 0.5;
      row.classList.add(half ? 'drag-over-top' : 'drag-over-bottom');
    });
    row.addEventListener('dragleave', () => {
      row.classList.remove('drag-over-top','drag-over-bottom');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over-top','drag-over-bottom');
      const fromId = e.dataTransfer.getData('text/plain');
      const toId = row.dataset.mileDrag;
      if (!fromId || fromId === toId) return;
      // Build ordered list, reorder, assign ordem values
      const sorted = Object.values(S.milestones).sort((a,b) => (a.ordem||0) - (b.ordem||0) || (a.dataInicio||a.data||'').localeCompare(b.dataInicio||b.data||''));
      const ids = sorted.map(m => m.id);
      const fromIdx = ids.indexOf(fromId);
      if (fromIdx === -1) return;
      ids.splice(fromIdx, 1);
      const toIdx = ids.indexOf(toId);
      const rect = row.getBoundingClientRect();
      const insertBefore = (e.clientY - rect.top) / rect.height < 0.5;
      ids.splice(insertBefore ? toIdx : toIdx + 1, 0, fromId);
      // Save new order
      const updates = {};
      ids.forEach((id, i) => { updates['milestones/' + id + '/ordem'] = i; });
      db.ref().update(updates);
    });
  });
}

function attachRiscos() {
  $$('[data-edit-risk]').forEach(el => el.onclick = () => {
    const r = S.risks[el.dataset.editRisk]; if (!r) return;
    S.modal = riskModal(r); render();
  });
  $$('[data-del-risk]').forEach(el => el.onclick = () => {
    S.modal = confirmModal('Excluir este risco?', () => fbRemove('risks/' + el.dataset.delRisk));
    render();
  });
}

function attachLixeira() {
  $$('[data-restore]').forEach(el => el.onclick = () => {
    const item = S.trash[el.dataset.restore]; if (!item) return;
    const restored = { ...item }; delete restored._deletedAt; delete restored._deletedBy;
    fbSet('activities/' + restored.id, restored);
    fbRemove('trash/' + restored.id);
    toast('Atividade restaurada');
  });
  $$('[data-perma-del]').forEach(el => el.onclick = () => {
    S.modal = confirmModal('Excluir permanentemente? Esta acao nao pode ser desfeita.', () => {
      fbRemove('trash/' + el.dataset.permaDel);
      toast('Atividade excluida permanentemente');
    });
    render();
  });
  const ea = $('#trash-empty-all');
  if (ea) ea.onclick = () => {
    S.modal = confirmModal(`Excluir permanentemente ${Object.keys(S.trash).length} ${Object.keys(S.trash).length===1?'item':'itens'}? Esta acao nao pode ser desfeita.`, () => {
      fbRemove('trash');
      toast('Lixeira esvaziada');
    });
    render();
  };
}

function attachModal() {
  const ov = $('#modal-overlay'); if (!ov) return;
  ov.onclick = e => { if (e.target === ov) closeModal(); };
  const cl = $('#modal-close'); if (cl) cl.onclick = closeModal;
  const ca = $('#modal-cancel'); if (ca) ca.onclick = closeModal;

  // Confirm modal
  const cf = $('#modal-confirm');
  if (cf) cf.onclick = () => { if (window._confirmYes) window._confirmYes(); closeModal(); };

  // Subtasks
  const bst = $('#btn-add-subtask');
  if (bst) {
    const actId = bst.dataset.id;
    const subtasksRef = db.ref('activities/' + actId + '/subtarefas');
    const subtasksListener = subtasksRef.on('value', snap => {
      const sl = $('#subtasks-list');
      if (sl) {
        sl.innerHTML = renderSubtarefas(snap.val());
        sl.querySelectorAll('[data-subtask-toggle]').forEach(cb => {
          cb.onchange = () => { fbSet('activities/' + actId + '/subtarefas/' + cb.dataset.subtaskToggle + '/done', cb.checked); };
        });
        sl.querySelectorAll('[data-del-subtask]').forEach(btn => {
          btn.onclick = e => { e.stopPropagation(); fbRemove('activities/' + actId + '/subtarefas/' + btn.dataset.delSubtask); };
        });
      }
    });
    const origClose2 = window._closeModalCleanup;
    window._closeModalCleanup = () => { subtasksRef.off('value', subtasksListener); if (origClose2) origClose2(); };
    const addSubtask = () => {
      const input = $('#f-subtask'); if (!input) return;
      const titulo = input.value.trim(); if (!titulo) { input.focus(); return; }
      const sid = genId();
      const subs = S.activities[actId]?.subtarefas || {};
      const ordem = Object.keys(subs).length;
      fbSet('activities/' + actId + '/subtarefas/' + sid, { id: sid, titulo, done: false, ordem });
      input.value = '';
      input.focus();
    };
    bst.onclick = addSubtask;
    const si = $('#f-subtask');
    if (si) si.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); addSubtask(); } };
  }

  // Add comment
  const bc = $('#btn-add-comment');
  if (bc) {
    const actId = bc.dataset.id;
    // Live listener for comments
    const commentsRef = db.ref('activities/' + actId + '/comentarios');
    const commentsListener = commentsRef.on('value', snap => {
      const cl = $('#comments-list');
      if (cl) {
        cl.innerHTML = renderComments(snap.val());
        cl.querySelectorAll('[data-del-comment]').forEach(btn => {
          btn.onclick = e => { e.stopPropagation(); fbRemove('activities/' + actId + '/comentarios/' + btn.dataset.delComment); };
        });
      }
    });
    // Clean up listener when modal closes
    const origClose = window._closeModalCleanup;
    window._closeModalCleanup = () => { commentsRef.off('value', commentsListener); if (origClose) origClose(); };
    const sendComment = () => {
      const input = $('#f-comment'); if (!input) return;
      const html = input.innerHTML.trim();
      const texto = input.innerText.trim();
      if (!texto) { input.focus(); return; }
      const cid = genId();
      fbSet('activities/' + actId + '/comentarios/' + cid, { id: cid, texto, html: sanitizeHtml(html), autor: S.user, data: new Date().toISOString() });
      input.innerHTML = '';
    };
    bc.onclick = sendComment;
    const ci = $('#f-comment');
    if (ci) ci.onkeydown = e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendComment(); } };
    // Toolbar buttons
    document.querySelectorAll('.comment-toolbar [data-cmd]').forEach(btn => {
      btn.onmousedown = e => e.preventDefault();
      btn.onclick = () => { document.execCommand(btn.dataset.cmd, false, null); ci.focus(); };
    });
    const colorPicker = $('#f-comment-color');
    if (colorPicker) {
      colorPicker.oninput = () => { document.execCommand('foreColor', false, colorPicker.value); ci.focus(); };
    }
  }
  // Save activity
  const sv = $('#modal-save');
  if (sv && S.view === 'kanban') {
    sv.onclick = () => {
      const titulo = $('#f-titulo').value.trim(); if (!titulo) { $('#f-titulo').focus(); return; }
      const data = {
        titulo, descricao: $('#f-desc').value, frente: $('#f-frente').value, coluna: $('#f-coluna').value,
        prioridade: $('#f-pri').value, responsavel: $('#f-resp').value, inicio: $('#f-inicio').value,
        prazo: $('#f-prazo').value, criteriosAceite: $('#f-criterios').value, dependencias: $('#f-deps').value, editadoPor: S.user,
        editadoEm: new Date().toISOString()
      };
      const id = sv.dataset.id || genId();
      if (!sv.dataset.id) data.criadoPor = S.user;
      data.id = id;
      fbSet('activities/' + id, { ...(S.activities[id]||{}), ...data });
      toast(sv.dataset.id ? 'Atividade atualizada' : 'Atividade criada');
      closeModal();
    };
  }
  // Save milestone
  if (sv && S.view === 'roadmap') {
    // Activity picker search filter
    const actSearch = $('#act-search');
    if (actSearch) {
      actSearch.oninput = () => {
        const q = actSearch.value.toLowerCase();
        $$('.act-picker-item').forEach(item => {
          const title = item.querySelector('.act-pick-title')?.textContent?.toLowerCase() || '';
          item.style.display = title.includes(q) ? '' : 'none';
        });
      };
    }
    // Update linked count on checkbox change
    const picker = $('#act-picker');
    if (picker) {
      picker.onchange = () => {
        const count = $$('.act-check:checked').length;
        const lc = $('#linked-count');
        if (lc) lc.textContent = `${count} atividade${count!==1?'s':''} vinculada${count!==1?'s':''}`;
      };
    }
    sv.onclick = () => {
      const titulo = $('#f-titulo').value.trim(); if (!titulo) { $('#f-titulo').focus(); return; }
      const id = sv.dataset.id || genId();
      const atividades = Array.from($$('.act-check:checked')).map(cb => cb.value);
      fbSet('milestones/' + id, { id, titulo, descricao: $('#f-desc').value, dataInicio: $('#f-data-inicio').value, dataFim: $('#f-data-fim').value, frente: $('#f-frente').value, status: $('#f-status').value, atividades });
      toast(sv.dataset.id ? 'Marco atualizado' : 'Marco criado');
      closeModal();
    };
  }
  // Save risk
  if (sv && S.view === 'riscos') {
    sv.onclick = () => {
      const titulo = $('#f-titulo').value.trim(); if (!titulo) { $('#f-titulo').focus(); return; }
      const id = sv.dataset.id || genId();
      fbSet('risks/' + id, { id, titulo, impacto: $('#f-impacto').value, mitigacao: $('#f-mitigacao').value,
        severidade: $('#f-sev').value, probabilidade: $('#f-prob').value, frente: $('#f-frente').value,
        status: $('#f-status').value, responsavel: $('#f-resp').value });
      toast(sv.dataset.id ? 'Risco atualizado' : 'Risco criado');
      closeModal();
    };
  }
  // Focus first input
  setTimeout(() => { const fi = $('#f-titulo'); if (fi) fi.focus(); }, 100);
}

function closeModal() { if (window._closeModalCleanup) { window._closeModalCleanup(); window._closeModalCleanup = null; } S.modal = null; render(); }
function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function sanitizeHtml(html) {
  const allowed = {B:1,STRONG:1,I:1,EM:1,BR:1,SPAN:1,FONT:1,DIV:1,P:1};
  const tmp = document.createElement('div'); tmp.innerHTML = html;
  function clean(el) {
    [...el.childNodes].forEach(n => {
      if (n.nodeType === 1) {
        if (!allowed[n.tagName]) { el.replaceChild(document.createTextNode(n.textContent), n); }
        else {
          [...n.attributes].forEach(a => { if (a.name !== 'style' && a.name !== 'color') n.removeAttribute(a.name); });
          if (n.style) { const c = n.style.color; const bg = n.style.backgroundColor; n.removeAttribute('style'); if (c) n.style.color = c; if (bg) n.style.backgroundColor = bg; }
          clean(n);
        }
      }
    });
  }
  clean(tmp); return tmp.innerHTML;
}

// ============================================================
// INIT
// ============================================================
render();
if (S.user) initSync();
</script>
