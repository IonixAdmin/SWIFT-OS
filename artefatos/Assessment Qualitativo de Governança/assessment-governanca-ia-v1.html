// ─── RADAR VISUAL ───
function RadarChart({ scores }) {
  const size = 300;
  const cx = size / 2;
  const cy = size / 2;
  const maxR = 120;
  const levels = 5;

  const dims = DIMENSOES;
  const n = dims.length;

  function polar(i, r) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  }

  const gridLevels = Array.from({ length: levels }, (_, l) => {
    const r = (maxR / levels) * (l + 1);
    return dims.map((_, i) => polar(i, r)).map(p => `${p.x},${p.y}`).join(' ');
  });

  const dataPoints = dims.map((d, i) => {
    const val = scores[d] !== null && scores[d] !== undefined ? scores[d] : 0;
    const r = (maxR / (levels - 1)) * val;
    return polar(i, r);
  });
  const dataPath = dataPoints.map(p => `${p.x},${p.y}`).join(' ');

  const labelPoints = dims.map((d, i) => {
    const p = polar(i, maxR + 25);
    return { ...p, label: d };
  });

  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-[300px] mx-auto">
      {/* Grid */}
      {gridLevels.map((pts, l) => (
        <polygon key={l} points={pts} fill="none" stroke="#e2e8f0" strokeWidth="1" opacity={0.5} />
      ))}
      {/* Axes */}
      {dims.map((_, i) => {
        const p = polar(i, maxR);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1" opacity={0.3} />;
      })}
      {/* Data */}
      <polygon points={dataPath} fill="#3B82F6" fillOpacity="0.2" stroke="#3B82F6" strokeWidth="2" />
      {dataPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="4" fill={DIM_COLORS[dims[i]]} />
      ))}
      {/* Labels */}
      {labelPoints.map((p, i) => (
        <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
          className="text-[8px] font-medium fill-gray-500 dark:fill-gray-400">
          {DIM_ICONS[p.label]}
        </text>
      ))}
    </svg>
  );
}

// ─── GUIA DE ENTREVISTA (EXPORTÁVEL) ───
function GuiaEntrevista({ audiencia, perguntas }) {
  const filtradas = audiencia === 'Todas'
    ? perguntas
    : perguntas.filter(p => p.audiencia === audiencia);

  const porDimensao = DIMENSOES.reduce((acc, d) => {
    acc[d] = filtradas.filter(p => p.dimensao === d);
    return acc;
  }, {});

  return (
    <div className="space-y-8">
      {DIMENSOES.map(dim => {
        const ps = porDimensao[dim];
        if (ps.length === 0) return null;
        return (
          <div key={dim}>
            <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
              <span>{DIM_ICONS[dim]}</span>
              <span>{dim}</span>
              <span className="text-sm font-normal text-gray-400">({ps.length} perguntas)</span>
            </h3>
            <div className="space-y-4 ml-2 border-l-2 pl-4" style={{ borderColor: DIM_COLORS[dim] + '40' }}>
              {ps.map((p, i) => (
                <div key={p.id} className="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-xs font-bold px-2 py-0.5 rounded" style={{ backgroundColor: DIM_COLORS[dim] + '15', color: DIM_COLORS[dim] }}>
                      {p.id}
                    </span>
                    <Badge text={AUDIENCIA_LABELS[p.audiencia].nome} color={AUDIENCIA_LABELS[p.audiencia].cor} />
                  </div>
                  <div className="font-medium text-sm mb-2">{p.pergunta}</div>
                  <div className="text-xs text-gray-500 italic">🎯 {p.objetivo}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── COMPONENTE PRINCIPAL ───
function App() {
  const [dark, setDark] = useState(false);
  const [activeTab, setActiveTab] = useState('visao-geral');
  const [selectedDim, setSelectedDim] = useState(null);
  const [selectedAud, setSelectedAud] = useState('Todas');
  const [drawerPergunta, setDrawerPergunta] = useState(null);
  const [notas, setNotas] = useState({});
  const [maturidade, setMaturidade] = useState(
    DIMENSOES.reduce((acc, d) => ({ ...acc, [d]: null }), {})
  );
  const [notasGerais, setNotasGerais] = useState('');

  const handleNotaChange = useCallback((id, val) => {
    setNotas(prev => ({ ...prev, [id]: val }));
  }, []);

  const handleMaturidadeChange = useCallback((dim, val) => {
    setMaturidade(prev => ({ ...prev, [dim]: val }));
  }, []);

  // Filtros
  const perguntasFiltradas = useMemo(() => {
    let result = PERGUNTAS;
    if (selectedDim) result = result.filter(p => p.dimensao === selectedDim);
    if (selectedAud !== 'Todas') result = result.filter(p => p.audiencia === selectedAud);
    return result;
  }, [selectedDim, selectedAud]);

  // Stats
  const stats = useMemo(() => {
    const preenchidas = Object.values(notas).filter(n => n && n.trim().length > 0).length;
    const avaliadas = Object.values(maturidade).filter(v => v !== null).length;
    const mediaMaturidade = avaliadas > 0
      ? Object.values(maturidade).filter(v => v !== null).reduce((a, b) => a + b, 0) / avaliadas
      : null;
    return { total: PERGUNTAS.length, preenchidas, avaliadas, mediaMaturidade };
  }, [notas, maturidade]);

  // LocalStorage persistence
  const LS_KEY = 'assessment-governanca-ia-swift';

  useEffect(() => {
    try {
      const saved = localStorage.getItem(LS_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        if (data.notas) setNotas(data.notas);
        if (data.maturidade) setMaturidade(data.maturidade);
        if (data.notasGerais) setNotasGerais(data.notasGerais);
      }
    } catch (e) { /* ignore */ }
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({ notas, maturidade, notasGerais }));
    } catch (e) { /* ignore */ }
  }, [notas, maturidade, notasGerais]);

  // Export
  const exportarJSON = useCallback(() => {
    const data = {
      dataExport: new Date().toISOString(),
      versao: 'v1',
      notas,
      maturidade,
      notasGerais,
      stats
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `assessment-governanca-ia-swift-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }, [notas, maturidade, notasGerais, stats]);

  // Import
  const fileInputRef = useRef(null);
  const importarJSON = useCallback(() => {
    fileInputRef.current?.click();
  }, []);
  const handleFileImport = useCallback((e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (data.notas) setNotas(data.notas);
        if (data.maturidade) setMaturidade(data.maturidade);
        if (data.notasGerais) setNotasGerais(data.notasGerais);
      } catch (err) {
        alert('Erro ao importar arquivo. Verifique se é um JSON válido exportado por este assessment.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }, []);

  const tabs = [
    { id: 'visao-geral', label: 'Visão Geral', icon: '📊' },
    { id: 'perguntas', label: 'Perguntas', icon: '❓' },
    { id: 'maturidade', label: 'Maturidade', icon: '📈' },
    { id: 'guia', label: 'Guia de Entrevista', icon: '📝' },
    { id: 'sintese', label: 'Síntese', icon: '📋' }
  ];

  return (
    <div className="min-h-screen">
      {/* Header */}
      <div className="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-4">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h1 className="text-xl font-bold">Assessment Qualitativo de Governança de IA</h1>
              <p className="text-sm text-gray-500 dark:text-gray-400">Swift — Projeto de Transformação em IA Escalável · IONIX</p>
            </div>
            <div className="flex items-center gap-3 no-print">
              <input type="file" ref={fileInputRef} accept=".json" onChange={handleFileImport} className="hidden" />
              <button onClick={importarJSON}
                className="px-3 py-2 text-sm font-medium bg-green-500 text-white rounded-lg hover:bg-green-600 transition flex items-center gap-2">
                ⬆️ Importar JSON
              </button>
              <button onClick={exportarJSON}
                className="px-3 py-2 text-sm font-medium bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition flex items-center gap-2">
                ⬇️ Exportar JSON
              </button>
              <button onClick={() => window.print()}
                className="px-3 py-2 text-sm font-medium bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                🖨️ Imprimir
              </button>
              <DarkModeToggle dark={dark} setDark={setDark} />
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 overflow-x-auto no-print">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                className={`px-4 py-2 text-sm font-medium rounded-t-lg transition whitespace-nowrap ${
                  activeTab === t.id
                    ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border-b-2 border-blue-500'
                    : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'
                }`}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="max-w-7xl mx-auto px-4 py-6">

        {/* ── VISÃO GERAL ── */}
        {activeTab === 'visao-geral' && (
          <div className="fade-in space-y-6">
            {/* Stats */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <StatCard label="Total de Perguntas" value={stats.total} color="#3B82F6" />
              <StatCard label="Notas Preenchidas" value={stats.preenchidas} sub={`de ${stats.total}`} color="#10B981" />
              <StatCard label="Dimensões Avaliadas" value={stats.avaliadas} sub={`de ${DIMENSOES.length}`} color="#8B5CF6" />
              <StatCard label="Maturidade Média" value={stats.mediaMaturidade !== null ? stats.mediaMaturidade.toFixed(1) : '—'} sub={stats.mediaMaturidade !== null ? MATURIDADE_LABELS[Math.round(stats.mediaMaturidade)] : 'Não avaliada'} color="#F59E0B" />
            </div>

            {/* Sobre o Assessment */}
            <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 shadow-sm">
              <h2 className="text-lg font-bold mb-4">Sobre este Assessment</h2>
              <div className="text-sm text-gray-700 dark:text-gray-300 leading-relaxed space-y-3">
                <p>
                  Este assessment qualitativo foi desenhado para mapear o <strong>estado atual da governança de IA na Swift</strong>,
                  identificando gaps, oportunidades e o nível de maturidade em cada dimensão crítica para o estabelecimento
                  de uma governança estruturada.
                </p>
                <p>
                  O assessment complementa a <strong>Pesquisa Quantitativa de Maturidade em IA (v5)</strong>, que mede o

            </div>

            {/* Dimensões */}
            <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 shadow-sm">

            {/* Metodologia */}

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="p-4 rounded-lg bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800">
                  <div className="font-semibold text-sm text-blue-700 dark:text-blue-400 mb-2">1. Preparação</div>

                    <li>• Definir ordem das dimensões</li>
                  </ul>
                </div>

                  <div className="font-semibold text-sm text-green-700 dark:text-green-400 mb-2">2. Entrevista</div>
                  <ul className="text-xs text-green-700 dark:text-green-300 space-y-1">
                    <li>• Usar guia de entrevista por audiência</li>
                    <li>• Registrar notas em tempo real</li>
                    <li>• Observar sinais positivos e de alerta</li>
                    <li>• Aprofundar temas emergentes</li>
                  </ul>
                </div>
                <div className="p-4 rounded-lg bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-800">
                  <div className="font-semibold text-sm text-purple-700 dark:text-purple-400 mb-2">3. Síntese</div>
                  <ul className="text-xs text-purple-700 dark:text-purple-300 space-y-1">
                    <li>• Avaliar maturidade por dimensão</li>
                    <li>• Consolidar achados e evidências</li>
                    <li>• Identificar gaps críticos</li>
                    <li>• Gerar recomendações para governança</li>
                  </ul>

            </div>
          </div>
        )}

        {/* ── PERGUNTAS ── */}
        {activeTab === 'perguntas' && (
          <div className="fade-in space-y-6">
            {/* Filtros */}
            <div className="flex flex-wrap gap-3 no-print">
              <div>
                <label className="text-xs font-medium text-gray-500 block mb-1">Dimensão</label>
                <select value={selectedDim || ''}

                  className="text-sm p-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
                  <option value="">Todas as dimensões</option>

                </select>
              </div>
              <div>
                <label className="text-xs font-medium text-gray-500 block mb-1">Audiência</label>
                <select value={selectedAud}
                  onChange={e => setSelectedAud(e.target.value)}
                  className="text-sm p-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
                  <option value="Todas">Todas as audiências</option>

              <div className="flex items-end">

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {perguntasFiltradas.map((p, i) => (

                              <span className="font-semibold" style={{ color: DIM_COLORS[dim] }}>{p.id}:</span>{' '}
                              <span className="text-gray-600 dark:text-gray-400">{notas[p.id]}</span>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="text-xs text-gray-400 italic">Nenhuma nota registrada</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Notas gerais */}
            <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 shadow-sm no-print">
              <h2 className="text-lg font-bold mb-4">Notas Gerais e Observações</h2>
              <textarea
                value={notasGerais}
                onChange={e => setNotasGerais(e.target.value)}
                placeholder="Registre observações gerais, padrões identificados, riscos, recomendações..."
                className="w-full text-sm p-4 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 resize-y min-h-[150px] focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                rows={6}
              />
            </div>

            {/* Progresso geral */}
            <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 shadow-sm">
              <h2 className="text-lg font-bold mb-4">Progresso do Assessment</h2>
              <div className="space-y-3">
                {DIMENSOES.map(dim => {
                  const ps = PERGUNTAS.filter(p => p.dimensao === dim);
                  const preenchidas = ps.filter(p => notas[p.id]?.trim()).length;
                  return (
                    <ProgressBar key={dim} label={dim.split(' ')[0]} value={preenchidas} max={ps.length} color={DIM_COLORS[dim]} />
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Drawer */}
      {drawerPergunta && <PerguntaDrawer pergunta={drawerPergunta} onClose={() => setDrawerPergunta(null)} />}

      {/* Footer */}
      <div className="border-t border-gray-200 dark:border-gray-800 mt-12 py-6 text-center text-xs text-gray-400">
        Assessment Qualitativo de Governança de IA · Swift × IONIX · v1.0 · Março 2026
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
