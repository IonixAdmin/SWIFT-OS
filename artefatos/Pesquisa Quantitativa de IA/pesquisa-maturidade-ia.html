  { id:'Q6', texto:'Ja usou IA?', fase:'0.5', dimensao:'Utilizacao', tipo:'Mapa', scoring:'Nenhum', hipoteses:['S1','D1'],
    textoCompleto:'Voce ja utilizou alguma ferramenta de Inteligencia Artificial?', opcoes:['Sim','Nao'], importa:'Filtro binario: separa quem ja experimentou de quem nunca tocou. Se Nao → pula para Q11' },
  { id:'Q7', texto:'Quais ferramentas de IA ja utilizou', fase:'0.5', dimensao:'Utilizacao', tipo:'Mapa', scoring:'Nenhum', hipoteses:['S1'],
    textoCompleto:'Quais ferramentas de IA voce ja utilizou? (marque todas que se aplicam)', opcoes:['ChatGPT','Copilot','Claude','Gemini','Midjourney/DALL-E','IA do Office/Google','N8N','Lovable','Lindy','Outras'], importa:'Mapa de amplitude — quantas e quais ferramentas conhecem. Inclui stack do projeto (Lovable, N8N, Lindy)' },
  { id:'Q8', texto:'Frequencia de uso de IA', fase:'0.5', dimensao:'Utilizacao', tipo:'Mapa', scoring:'Nenhum', hipoteses:['S1','S11','D1'],
    textoCompleto:'Com que frequencia voce usa ferramentas de IA?', opcoes:['Diariamente','Algumas vezes por semana','Algumas vezes por mes','Raramente'], importa:'Discrimina uso pontual (nivel 2) de regular (nivel 3). Componente do score de early adopter' },
  { id:'Q9', texto:'Tipos de tarefa em que usa IA', fase:'0.5', dimensao:'Utilizacao', tipo:'Mapa', scoring:'Nenhum', hipoteses:['S1','S4','D1'],
    textoCompleto:'Para quais tipos de tarefa voce usa IA? (marque todas)', opcoes:['Gerar/revisar textos','Resumir documentos','Pesquisar informacoes','Analisar dados','Criar apresentacoes','Programar/automatizar','Gerar imagens','Apoiar decisoes','Outras'], importa:'Mapa de complexidade — tarefas simples (texto, resumo) vs complexas (dados, decisoes, automacao)' },
  { id:'Q10', texto:'Como comecou a usar IA', fase:'0.5', dimensao:'Cultura', tipo:'Mapa', scoring:'Nenhum', hipoteses:['S2','D1'],
    textoCompleto:'Como voce comecou a usar IA no trabalho?', opcoes:['Por conta propria/curiosidade','Indicacao de colega','Pedido/incentivo da empresa','Treinamento formal','Outro'], importa:'Valida S2 — se adocao e organica, o programa tem vento a favor. Energia reprimida que a esteira canaliza' },
  { id:'Q11', texto:'Usa IA com dados reais do trabalho?', fase:'0.5', dimensao:'Dados', tipo:'Mapa', scoring:'Nenhum', hipoteses:['S3','D1','D7'],
    textoCompleto:'Voce ja usou IA com dados reais do seu trabalho (planilhas, relatorios, bases de dados da Swift)?', opcoes:['Sim, frequentemente','Sim, algumas vezes','Nao, so com dados genericos','Nunca usei IA'], importa:'Valida S3 — sem dados reais, toda experimentacao e cosmetica. Diferencia consumidor de output de produtor de valor' },
  { id:'Q12', texto:'Utilizo IA regularmente (pelo menos algumas vezes por semana)', fase:'1', dimensao:'Utilizacao', tipo:'Likert', scoring:'Comum', hipoteses:['S1','S13'], transicao:'2→3',
    textoCompleto:'Utilizo ferramentas de IA regularmente no meu trabalho (pelo menos algumas vezes por semana).', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Base da dimensao — mede frequencia real de uso. Discrimina quem nao usa (nivel 1) de quem usa regularmente (nivel 3)' },
  { id:'Q13', texto:'Consigo avaliar se o resultado da IA e bom ou precisa de ajustes', fase:'1', dimensao:'Utilizacao', tipo:'Likert', scoring:'Comum', hipoteses:['S13','S4'], transicao:'2→3',
    textoCompleto:'Consigo avaliar se o resultado gerado por uma ferramenta de IA e bom ou precisa de ajustes.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Competencia critica do nivel 3 — avaliar outputs. Sem isso, o colaborador aceita qualquer resultado sem questionar' },
  { id:'Q14', texto:'Sei adaptar o prompt para obter resultados melhores', fase:'1', dimensao:'Utilizacao', tipo:'Likert', scoring:'Comum', hipoteses:['S13','S4'], transicao:'2→3',
    textoCompleto:'Sei adaptar a forma como peco algo para a IA (prompt) para obter resultados melhores.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Prompting eficiente e marcador de nivel 3 na Matriz. Diferencia quem \'pede e aceita\' de quem \'itera e refina\'' },
  { id:'Q15', texto:'Consigo identificar e corrigir um erro da IA', fase:'1', dimensao:'Utilizacao', tipo:'Likert', scoring:'Comum', hipoteses:['S13','S4'], transicao:'3→4',
    textoCompleto:'Quando a IA gera um resultado incorreto ou incompleto, consigo identificar o problema e corrigi-lo.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Discrimina nivel 3→4 — resolver problemas complexos. Quem corrige erros da IA demonstra dominio real da ferramenta' },
  { id:'Q16', texto:'Acho dificil avaliar se o resultado da IA e confiavel', fase:'1', dimensao:'Utilizacao', tipo:'Likert Reverso', scoring:'Comum', hipoteses:['S13','D4'], transicao:'2→3',
    textoCompleto:'Acho dificil avaliar se o resultado gerado por IA e confiavel ou nao. (ITEM REVERSO)', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Controle de vies — quem concorda com tudo em Q13-Q15 mas tambem concorda aqui esta respondendo sem ler. Score e invertido' },
  { id:'Q17', texto:'Quanto confia nos resultados de IA?', fase:'1', dimensao:'Utilizacao', tipo:'Confianca', scoring:'Comum', hipoteses:['D4'], transicao:'transversal',
    textoCompleto:'Quanto voce confia nos resultados gerados por IA?', opcoes:['1 Nao confio nada','2','3','4','5 Confio totalmente'], importa:'Escala especial — confianca 3 e ideal (calibrada), confianca 5 e PENALIZADA (risco de governanca). Detecta quem aceita tudo cegamente' },
  { id:'Q18', texto:'Ja utilizei IA para apoiar uma decisao importante', fase:'1', dimensao:'Utilizacao', tipo:'Likert', scoring:'Comum', hipoteses:['S1','S13'], transicao:'3→4',
    textoCompleto:'Ja utilizei IA para apoiar uma decisao importante no meu trabalho.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Marcador de nivel 3→4 — uso estrategico para decisoes. Diferencia quem usa para tarefas operacionais de quem usa para decidir' },
  { id:'Q19', texto:'Verifico e preparo dados antes de usar IA', fase:'1', dimensao:'Dados', tipo:'Likert', scoring:'Comum', hipoteses:['S14','S3'], transicao:'2→3',
    textoCompleto:'Antes de usar IA para uma tarefa, verifico e preparo os dados que vou fornecer.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Testa pratica real de preparacao de dados (nivel 3). Quem marca alto aqui entende que garbage in = garbage out' },
  { id:'Q20', texto:'Qualidade dos dados influencia qualidade do resultado', fase:'1', dimensao:'Dados', tipo:'Likert', scoring:'Comum', hipoteses:['S3','S14'], transicao:'1→2',
    textoCompleto:'Acredito que a qualidade dos dados que forneco a IA influencia diretamente a qualidade do resultado.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Awareness basica (nivel 2). Tende a ter efeito teto — a maioria concorda. Discrimina nivel 1 (nao sabe) de nivel 2+ (sabe)' },
  { id:'Q21', texto:'Identifico quais dados alimentariam uma solucao de IA', fase:'1', dimensao:'Dados', tipo:'Likert', scoring:'Comum', hipoteses:['S14','D7'], transicao:'2→3',
    textoCompleto:'Consigo identificar quais dados do meu trabalho poderiam ser usados para alimentar uma solucao de IA.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Compreende relevancia dos dados (nivel 2→3). Quem marca alto consegue conectar seu contexto com possibilidades de IA' },
  { id:'Q22', texto:'Verifico dados/numeros que a IA apresenta', fase:'1', dimensao:'Dados', tipo:'Likert', scoring:'Comum', hipoteses:['S14'], transicao:'2→3',
    textoCompleto:'Quando a IA me apresenta dados ou numeros, verifico se fazem sentido antes de usa-los.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Senso critico sobre dados de saida. Conecta Dados com Governanca — quem nao verifica numeros e risco em ambas as dimensoes' },
  { id:'Q23', texto:'Cenario vendas — o que faz primeiro?', fase:'1', dimensao:'Dados', tipo:'Cenario', scoring:'Comum', hipoteses:['S3','S14'], transicao:'1→4', conversao:'d=1, a=2, b=3, c=4',
    textoCompleto:'Cenario: Voce precisa usar IA para analisar as vendas do ultimo trimestre. O que voce faz primeiro?', opcoes:['a) Peco direto para a IA analisar','b) Verifico se os dados estao corretos antes de enviar','c) Estruturo os dados num formato adequado e verifico a qualidade','d) Nao saberia como comecar'], importa:'Cenario comportamental — testa competencia real, nao autopercepacao. Reduz Dunning-Kruger. Cada opcao mapeia para um nivel (d=1, a=2, b=3, c=4)' },
  { id:'Q24', texto:'Sei quais informacoes NAO compartilhar com IA publica', fase:'1', dimensao:'Governanca', tipo:'Likert', scoring:'Comum', hipoteses:['S10'], transicao:'1→2→3',
    textoCompleto:'Sei quais tipos de informacao da empresa NAO deveriam ser compartilhados com ferramentas de IA publicas.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Nocoes basicas de protecao de dados (nivel 1→2→3). Fundamental para governanca — quem nao sabe pode estar vazando dados confidenciais' },
  { id:'Q25', texto:'Cenario relatorio confidencial', fase:'1', dimensao:'Governanca', tipo:'Cenario', scoring:'Comum', hipoteses:['S10'], transicao:'1→4', conversao:'a=1, e=1, d=2, b=3, c=4',
    textoCompleto:'Cenario: Voce precisa analisar um relatorio confidencial e pensa em usar o ChatGPT. O que voce faz?', opcoes:['a) Cola o conteudo diretamente','b) Remove dados sensiveis antes','c) Usa ferramenta interna aprovada','d) Nao usaria IA para dados confidenciais','e) Nao saberia avaliar o risco'], importa:'Cenario comportamental de governanca — testa o que a pessoa FARIA, nao o que SABE. a/e = nivel 1, d = nivel 2, b = nivel 3, c = nivel 4' },
  { id:'Q26', texto:'Conheco diretrizes da empresa sobre IA', fase:'1', dimensao:'Governanca', tipo:'Likert', scoring:'Comum', hipoteses:['S10','S15'], transicao:'2→3→4',
    textoCompleto:'Conheco as diretrizes ou boas praticas da minha empresa sobre o uso de IA no ambiente de trabalho.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Testa conhecimento institucional. Se a maioria marca baixo, a Swift precisa comunicar ou criar diretrizes antes de escalar uso' },
  { id:'Q27', texto:'Verifico informacoes com outras fontes antes de decisao', fase:'1', dimensao:'Governanca', tipo:'Likert', scoring:'Comum', hipoteses:['S10'], transicao:'2→3',
    textoCompleto:'Antes de usar o resultado de uma IA para uma decisao importante, verifico as informacoes com outras fontes.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Boas praticas aplicadas (nivel 2→3). Quem verifica demonstra pensamento critico — essencial para uso responsavel' },
  { id:'Q28', texto:'Saberia identificar responsavel se IA errasse', fase:'1', dimensao:'Governanca', tipo:'Likert', scoring:'Comum', hipoteses:['S10','S15'], transicao:'3→4',
    textoCompleto:'Se uma IA gerasse uma recomendacao errada que impactasse meu trabalho, saberia identificar quem e o responsavel pelo erro — eu, a ferramenta ou a empresa.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Compliance e responsabilidade (nivel 3→4). Unico item que testa accountability — essencial para governanca avancada' },
  { id:'Q29', texto:'Cenario e-mail para cliente', fase:'1', dimensao:'Governanca', tipo:'Cenario', scoring:'Comum', hipoteses:['S10','S13'], transicao:'1→4', conversao:'a=1, d=2, b=2.5, c=4',
    textoCompleto:'Cenario: Voce usa IA para redigir um e-mail importante para um cliente. Antes de enviar, o que voce faz?', opcoes:['a) Envia direto, confio no resultado','b) Leio por cima para ver se esta ok','c) Reviso criticamente, adapto o tom e verifico as informacoes','d) Nao usaria IA para isso'], importa:'Cenario cotidiano de verificacao — mais tangivel que o relatorio confidencial. Captura comportamento real de quem usa IA no dia a dia' },
  { id:'Q30', texto:'Identifico processo que IA melhoraria', fase:'1', dimensao:'Impacto', tipo:'Likert', scoring:'Comum', hipoteses:['S6','S7','D2'], transicao:'1→2→3',
    textoCompleto:'Consigo identificar pelo menos um processo no meu trabalho que poderia ser melhorado com IA.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Base de Impacto — quem nao identifica oportunidades esta no nivel 1. Quem identifica pelo menos uma ja esta no nivel 2' },
  { id:'Q31', texto:'Explico como IA gera valor na minha area', fase:'1', dimensao:'Impacto', tipo:'Likert', scoring:'Comum', hipoteses:['S6','S8'], transicao:'2→3→4',
    textoCompleto:'Saberia explicar para um colega como IA poderia gerar valor na minha area.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Articulacao de valor (nivel 2→3→4). Quem explica para outros demonstra compreensao estruturada, nao so intuicao' },
  { id:'Q32', texto:'Diferencio quando IA economiza tempo de quando muda resultado', fase:'1', dimensao:'Impacto', tipo:'Likert', scoring:'Comum', hipoteses:['S8','D8'], transicao:'3→4',
    textoCompleto:'Consigo diferenciar quando o uso de IA apenas economiza tempo de quando ele muda a forma como o resultado e entregue.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Visao estrategica (nivel 3→4). Diferencia quem pensa em eficiencia (cortar custo) de quem pensa em transformacao (mudar o jogo)' },
  { id:'Q33', texto:'Estimo tempo/custo que IA economizaria', fase:'1', dimensao:'Impacto', tipo:'Likert', scoring:'Comum', hipoteses:['S6'], transicao:'3→4',
    textoCompleto:'Consigo estimar o tempo ou custo que uma solucao de IA economizaria em um processo da minha area.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Quantificacao de impacto (nivel 3→4). Quem estima ROI consegue estruturar business cases — competencia de nivel avancado' },
  { id:'Q34', texto:'Ja sugeri ideia de IA para gestor/equipe', fase:'1', dimensao:'Impacto', tipo:'Likert', scoring:'Comum', hipoteses:['S6','D2'], transicao:'2→3',
    textoCompleto:'Ja sugeri ou propus alguma ideia de uso de IA no meu trabalho para meu gestor ou equipe.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Acao concreta (nivel 2→3). Diferencia quem ve oportunidades de quem age — alimenta o backlog da esteira' },
  { id:'Q35', texto:'Interesse ativo em aprender sobre IA', fase:'1', dimensao:'Cultura', tipo:'Likert', scoring:'Comum', hipoteses:['S12'], transicao:'1→2',
    textoCompleto:'Tenho interesse ativo em aprender mais sobre IA aplicada ao meu trabalho.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Base de Cultura — mede disposicao (nivel 1→2). Num publico 81% entusiasta, pode ter efeito teto' },
  { id:'Q36', texto:'Nao me sinto confortavel recomendando IA para colegas', fase:'1', dimensao:'Cultura', tipo:'Likert Reverso', scoring:'Comum', hipoteses:['S5','S12'], transicao:'2→3',
    textoCompleto:'Nao me sinto confortavel em recomendar o uso de IA para colegas. (ITEM REVERSO)', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Controle de vies + mede conforto em disseminar (nivel 2→3). Score invertido. Quem concorda tem barreira para ser incentivador' },
  { id:'Q37', texto:'Compartilhei dica/aprendizado de IA com colegas', fase:'1', dimensao:'Cultura', tipo:'Likert', scoring:'Comum', hipoteses:['S11'], transicao:'2→3→4',
    textoCompleto:'Ja compartilhei com colegas alguma dica ou aprendizado sobre uso de IA.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Comportamento de incentivador (nivel 2→3→4). Componente do score de early adopter — quem compartilha e multiplicador natural' },
  { id:'Q38', texto:'Experimento ferramentas novas por conta propria', fase:'1', dimensao:'Cultura', tipo:'Likert', scoring:'Comum', hipoteses:['S12','S2','S11'], transicao:'2→3',
    textoCompleto:'Quando surge uma nova ferramenta de IA, costumo experimentar por conta propria para ver se e util no meu trabalho.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Proatividade (nivel 2→3). Quem experimenta por conta propria tem perfil de early adopter — nao precisa ser empurrado' },
  { id:'Q39', texto:'Busco ativamente formas de aplicar IA no trabalho', fase:'1', dimensao:'Cultura', tipo:'Likert', scoring:'Comum', hipoteses:['S12','S11'], transicao:'2→3→4',
    textoCompleto:'Busco ativamente formas de aplicar IA para melhorar meu trabalho ou o da minha equipe.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Agente de mudanca (nivel 2→3→4). Diferencia quem usa para si de quem busca melhorar o coletivo — postura de transformacao' },
  { id:'Q40', texto:'Maior barreira para usar IA', fase:'Controle', dimensao:'Cultura', tipo:'Descritiva', scoring:'Nenhum', hipoteses:['S5','S12'],
    textoCompleto:'A maior barreira para eu usar mais IA e: (marque a principal)', opcoes:['Falta de tempo','Nao saber por onde comecar','Falta de ferramentas aprovadas','Medo de errar ou gerar problemas','Preocupacao com impacto no meu cargo/funcao','Meu trabalho nao se aplica a IA','Ja uso bastante'], importa:'Diagnostico de barreiras — identifica qual intervencao priorizar. \'Nao saber por onde comecar\' = curadoria. \'Impacto no cargo\' = comunicacao sobre substituicao' },
  { id:'Q41', texto:'Attention check', fase:'Controle', dimensao:'Controle', tipo:'Controle', scoring:'Nenhum', hipoteses:[],
    textoCompleto:'Para fins de verificacao, marque a opcao \'Concordo parcialmente\' nesta pergunta.', opcoes:['1 Discordo totalmente','2 Discordo parcialmente','3 Neutro','4 Concordo parcialmente','5 Concordo totalmente'], importa:'Attention check — identifica respostas aleatorias. Quem erra e excluido da analise' },
  { id:'Q42', texto:'Voce seria multiplicador de IA na sua area?', fase:'Controle', dimensao:'Cultura', tipo:'Descritiva', scoring:'Nenhum', hipoteses:['S11'],
    textoCompleto:'Voce teria interesse em ser um multiplicador de IA na sua area, ajudando colegas a adotar ferramentas?', opcoes:['Sim, com certeza','Sim, se tiver suporte e treinamento','Talvez','Nao'], importa:'Dupla validacao de early adopters — cruza com score comportamental. Quem \'ja faz\' + \'quer multiplicar\' = candidato para Germinare' },
  { id:'Q43', texto:'Como voce usa IA no dia a dia?', fase:'2A', dimensao:'Utilizacao', tipo:'Cenario', scoring:'Estendido', hipoteses:['S1','S13','S4','S11'], transicao:'1→4', conversao:'a=1, b=2.5, d=3, c=4',
    textoCompleto:'Quando uso IA no trabalho, normalmente eu:', opcoes:['a) Uso exatamente o primeiro resultado','b) Ajusto o prompt ate resultado satisfatorio','c) Combino o resultado com outras fontes e analises','d) Uso como ponto de partida e refaco manualmente'], importa:'Melhor discriminador de profundidade real. Score Estendido Execucao → Utilizacao. Se maioria marca (a), confirma S13' },
  { id:'Q44', texto:'Ja automatizou alguma tarefa com IA?', fase:'2A', dimensao:'Utilizacao', tipo:'Escala', scoring:'Estendido', hipoteses:['S11'], transicao:'1→4', conversao:'nunca=1, nao visualizo=1, possivel=2, uma vez=3, mais de uma=4',
    textoCompleto:'Ja consegui automatizar ou simplificar uma tarefa repetitiva usando IA?', opcoes:['Sim, mais de uma vez','Sim, uma vez','Nao, mas sei que seria possivel','Nao, nao consigo visualizar como','Nunca tentei'], importa:'Marcador de nivel 4 — \'automatizar atividades\'. Score Estendido Execucao → Utilizacao. Componente do score de early adopter' },
  { id:'Q45', texto:'Interesse em treinamento de IA', fase:'2A', dimensao:'Cultura', tipo:'Descritiva', scoring:'Nenhum', hipoteses:['D6','S12'],
    textoCompleto:'Se a empresa oferecesse treinamento pratico em IA, o que mais te interessaria? (marque todas)', opcoes:['Automatizar tarefas repetitivas','Analisar dados mais rapido','Criar relatorios e apresentacoes','Programar sem ser programador (vibe coding)','Usar IA para tomar decisoes melhores','Outro'], importa:'Calibra formato da Germinare e trilhas. Errar o formato queima engajamento' },
  { id:'Q46', texto:'O que impede de usar mais IA?', fase:'2A', dimensao:'Cultura', tipo:'Descritiva', scoring:'Nenhum', hipoteses:['S5','S12'],
    textoCompleto:'O que MAIS te impede de usar IA com mais profundidade no trabalho?', opcoes:['Nao tenho acesso a ferramentas boas','Nao sei usar direito','Nao tenho permissao/politica clara','Meu gestor nao incentiva','Preocupacao com impacto no meu cargo','Nao vejo aplicacao','Falta de tempo','Nada, ja uso bastante'], importa:'Diagnostico de barreiras especifico para Execucao. Similar a Q40 mas com opcoes adicionais (gestor nao incentiva)' },
  { id:'Q47', texto:'Quem deveria ser responsavel por IA na Swift?', fase:'2B', dimensao:'Impacto', tipo:'Descritiva', scoring:'Nenhum', hipoteses:['S7'],

// ─── HELPER: get scoring conversion for a question
function getConversion(q) {
  if (q.tipo === 'Likert') return LIKERT_PADRAO;
  if (q.tipo === 'Likert Reverso') return LIKERT_REVERSO;
  if (q.tipo === 'Confianca') return CONFIANCA;
  return null;
}

function getNivel(score) {
  if (score < 1.5) return FAIXAS[0];
  if (score < 2.5) return FAIXAS[1];
  if (score < 3.5) return FAIXAS[2];
  return FAIXAS[3];
}

  const items = subTab === 'C' ? CERTEZAS : subTab === 'S' ? SUPOSICOES : DUVIDAS;

  const filtered = useMemo(() => {
    return items.filter(h => {
      if (filterDim !== 'Todas' && h.dimensao !== filterDim) return false;
      if (subTab === 'S' && filterCluster !== 'Todos' && h.cluster !== filterCluster) return false;
      if (subTab !== 'C' && filterPrio !== 'Todas' && h.prioridade !== filterPrio) return false;

          </div>
          <div className="bg-white/70 dark:bg-gray-800/50 rounded-lg p-3">
            <div className="font-bold text-blue-600 mb-1">Duvidas (D1-D8)</div>
            <div className="text-gray-600 dark:text-gray-400">Questoes exploratorias — nao temos nem hipotese. O valor e gerar <strong>insights novos</strong> que nenhuma suposicao captura.</div>
          </div>
        </div>
        <p className="text-xs text-gray-500 dark:text-gray-400 mt-3">Cada suposicao e duvida esta mapeada a perguntas especificas da pesquisa e a dimensoes da Matriz de Letramento. Clique em qualquer card abaixo para ver os detalhes.</p>
      </div>

      {/* Sub tabs */}
      <div className="flex gap-2">
        <button onClick={() => {setSubTab('C');setExpanded(null);}} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${subTab==='C'?'bg-green-600 text-white':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300'}`}>
          Certezas ({CERTEZAS.length})
        </button>
        <button onClick={() => {setSubTab('S');setExpanded(null);}} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${subTab==='S'?'bg-purple-600 text-white':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300'}`}>
          Suposicoes ({SUPOSICOES.length})
        </button>
        <button onClick={() => {setSubTab('D');setExpanded(null);}} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${subTab==='D'?'bg-blue-600 text-white':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300'}`}>
          Duvidas ({DUVIDAS.length})
        </button>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-3">
        <select value={filterDim} onChange={e=>setFilterDim(e.target.value)} className="text-sm border rounded-lg px-3 py-1.5 bg-white dark:bg-gray-800 dark:border-gray-700">
          <option value="Todas">Todas dimensoes</option>
          {[...new Set(items.map(h=>h.dimensao))].map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        {subTab === 'S' && (
          <select value={filterCluster} onChange={e=>setFilterCluster(e.target.value)} className="text-sm border rounded-lg px-3 py-1.5 bg-white dark:bg-gray-800 dark:border-gray-700">
            <option value="Todos">Todos clusters</option>
            <option value="Execucao">Execucao</option>
            <option value="Gestao">Gestao</option>
            <option value="Transversal">Transversal</option>
          </select>
        )}
        {subTab !== 'C' && (
          <select value={filterPrio} onChange={e=>setFilterPrio(e.target.value)} className="text-sm border rounded-lg px-3 py-1.5 bg-white dark:bg-gray-800 dark:border-gray-700">
            <option value="Todas">Todas prioridades</option>
            <option value="Critica">Critica</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
          </select>
        )}
      </div>

      {/* Cards */}
      <div className="space-y-3">
        {filtered.map(h => {
          const isExp = expanded === h.id;
          return (
            <div key={h.id} className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden transition-all hover:shadow-md">
              <button onClick={() => setExpanded(isExp ? null : h.id)} className="w-full text-left p-4 flex items-start gap-3">
                <span className="text-sm font-mono font-bold text-gray-400 dark:text-gray-500 shrink-0 mt-0.5">{h.id}</span>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm mb-2">{h.titulo}</div>
                  <div className="flex flex-wrap gap-1.5">
                    {h.prioridade && <Badge text={h.prioridade} color={PRIO_COLORS[h.prioridade]} small/>}
                    <Badge text={h.dimensao} color={DIM_COLORS[h.dimensao] || '#6B7280'} small/>
                    {h.cluster && <Badge text={h.cluster} color={CLUSTER_COLORS[h.cluster]} small/>}
                    {h.transicao && <Badge text={h.transicao} color="#6B7280" small/>}
                    {h.fonte && <Badge text={h.fonte} color="#6B7280" small/>}
                  </div>
                </div>
                <svg className={`w-5 h-5 text-gray-400 shrink-0 transition-transform ${isExp?'rotate-180':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M19 9l-7 7-7-7"/></svg>
              </button>
              {isExp && (
                <div className="px-4 pb-4 pt-0 border-t border-gray-100 dark:border-gray-700 fade-in">
                  <div className="mt-3 space-y-4">
                    {/* Descrição */}
                    {h.desc && (
                      <div>
                        <h4 className="text-xs font-semibold text-gray-500 mb-1.5">O que estamos testando</h4>
                        <p className="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">{h.desc}</p>
                      </div>
                    )}
                    {/* Por que importa */}
                    {h.importa && (
                      <div className="bg-amber-50 dark:bg-amber-900/20 rounded-lg p-3 border border-amber-200 dark:border-amber-800">
                        <h4 className="text-xs font-semibold text-amber-700 dark:text-amber-400 mb-1">Por que e relevante</h4>
                        <p className="text-sm text-amber-800 dark:text-amber-300">{h.importa}</p>
                      </div>
                    )}
                    {/* O que desbloqueia (para Dúvidas) */}
                    {h.desbloqueia && (
                      <div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-3 border border-blue-200 dark:border-blue-800">
                        <h4 className="text-xs font-semibold text-blue-700 dark:text-blue-400 mb-1">O que desbloqueia</h4>
                        <p className="text-sm text-blue-800 dark:text-blue-300">{h.desbloqueia}</p>
                      </div>
                    )}
                    {/* Se confirmada / refutada */}
                    {(h.confirmada || h.refutada) && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {h.confirmada && (
                          <div className="bg-green-50 dark:bg-green-900/20 rounded-lg p-3 border border-green-200 dark:border-green-800">
                            <h4 className="text-xs font-semibold text-green-700 dark:text-green-400 mb-1">Se confirmada</h4>
                            <p className="text-xs text-green-800 dark:text-green-300">{h.confirmada}</p>
                          </div>
                        )}
                        {h.refutada && (
                          <div className="bg-red-50 dark:bg-red-900/20 rounded-lg p-3 border border-red-200 dark:border-red-800">
                            <h4 className="text-xs font-semibold text-red-700 dark:text-red-400 mb-1">Se refutada</h4>
                            <p className="text-xs text-red-800 dark:text-red-300">{h.refutada}</p>
                          </div>
                        )}
                      </div>
                    )}
                    {/* Perguntas que validam */}
                    {h.validacao && h.validacao.length > 0 && (
                      <div>
                        <h4 className="text-xs font-semibold text-gray-500 mb-2">Perguntas que validam</h4>
                        <div className="flex flex-wrap gap-1.5">
                          {h.validacao.map(qid => (
                            <button key={qid} onClick={(e) => {e.stopPropagation(); onOpenDrawer('pergunta', qid);}} className="text-xs px-2.5 py-1 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/50 font-medium transition">
                              {qid}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div className="text-center text-gray-400 py-8 text-sm">Nenhum item encontrado com os filtros selecionados.</div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// VIEW 4: PERGUNTAS
// ═══════════════════════════════════════════
function PerguntasView({ onOpenDrawer }) {
  const [filterFase, setFilterFase] = useState('Todas');
  const [filterDim, setFilterDim] = useState('Todas');
  const [filterScoring, setFilterScoring] = useState('Todos');
  const [expanded, setExpanded] = useState(null);
  const [collapsedFases, setCollapsedFases] = useState({});

  const FASE_META = {
    '0':       { nome: 'Fase 0 — Caracterizacao Demografica',        desc: '5 perguntas | ~2 min | Segmentacao e roteamento por cargo',         cor: '#94A3B8', icon: 'U' },
    '0.5':     { nome: 'Fase 0.5 — Mapa de Uso Atual',              desc: '6 perguntas | ~3 min | Mapeamento descritivo de ferramentas e frequencia', cor: '#64748B', icon: 'M' },
    '1':       { nome: 'Fase 1 — Maturidade nas 5 Dimensoes',       desc: '31 perguntas | ~10 min | Score Comum (28 itens) + controles + multiplicador', cor: '#3B82F6', icon: 'S' },
    'Controle':{ nome: 'Controle de Qualidade + Multiplicador',      desc: '3 perguntas | Attention check, barreiras e interesse em multiplicar',  cor: '#6B7280', icon: 'C' },
    '2A':      { nome: 'Fase 2A — Cluster Execucao',                desc: '4 perguntas | ~3 min | Assistentes, Analistas, Especialistas',       cor: '#8B5CF6', icon: 'E' },
    '2B':      { nome: 'Fase 2B — Cluster Gestao',                  desc: '6 perguntas | ~3 min | Coordenadores, Gerentes, Diretores',          cor: '#A855F7', icon: 'G' },
    '3':       { nome: 'Fase 3 — Perguntas Abertas',                desc: '5 perguntas | ~3 min | Q53 obrigatoria, Q54-Q57 opcionais',          cor: '#EC4899', icon: 'A' }
  };
  const FASE_ORDER = ['0','0.5','1','Controle','2A','2B','3'];

  const fases = ['0','0.5','1','2A','2B','3','Controle'];
  const dims = [...new Set(PERGUNTAS.map(q=>q.dimensao))];

  const filtered = useMemo(() => {
    return PERGUNTAS.filter(q => {
      if (filterFase !== 'Todas' && q.fase !== filterFase) return false;
      if (filterDim !== 'Todas' && q.dimensao !== filterDim) return false;
      if (filterScoring !== 'Todos' && q.scoring !== filterScoring) return false;
      return true;
    });
  }, [filterFase, filterDim, filterScoring]);

  const grouped = useMemo(() => {
    const groups = {};
    FASE_ORDER.forEach(f => { groups[f] = []; });
    filtered.forEach(q => {
      if (groups[q.fase]) groups[q.fase].push(q);
    });
    return groups;
  }, [filtered]);

  const showingAllFases = filterFase === 'Todas';

  function toggleFase(fase) {
    setCollapsedFases(prev => ({...prev, [fase]: !prev[fase]}));
  }

  function getFaseBadgeColor(fase) {
    return FASE_META[fase]?.cor || '#6B7280';
  }
  function getScoringColor(s) {
    if(s==='Comum') return '#10B981';
    if(s==='Estendido') return '#F59E0B';
    return '#94A3B8';
  }

  function renderOpcoes(q) {
    const dimColor = DIM_COLORS[q.dimensao] || '#6B7280';
    if (q.opcoes === null) {
      return (
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-gray-200 dark:border-gray-600">
          <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Formato de resposta</div>
          <div className="text-sm text-gray-600 dark:text-gray-300 italic">Resposta aberta (campo de texto)</div>
        </div>
      );
    }

    // Likert standard
    if (q.tipo === 'Likert') {
      return (
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-gray-200 dark:border-gray-600">
          <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Escala Likert (1-5)</div>
          <div className="flex flex-wrap gap-2 justify-between">
            {q.opcoes.map((op, i) => (
              <div key={i} className="flex-1 min-w-[80px] text-center">
                <div className="text-lg font-bold" style={{color: dimColor}}>{i+1}</div>
                <div className="text-[10px] text-gray-500 dark:text-gray-400 leading-tight">{op.replace(/^\d+\s*/, '')}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Likert Reverso
    if (q.tipo === 'Likert Reverso') {
      return (
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-orange-300 dark:border-orange-700">
          <div className="flex items-center gap-2 mb-2">
            <div className="text-xs font-semibold text-gray-500 dark:text-gray-400">Escala Likert (1-5)</div>
            <span className="text-[10px] px-1.5 py-0.5 rounded bg-orange-100 dark:bg-orange-900/40 text-orange-700 dark:text-orange-400 font-bold">(score invertido)</span>
          </div>
          <div className="flex flex-wrap gap-2 justify-between">
            {q.opcoes.map((op, i) => {
              const scores = [4.0, 3.0, 2.0, 1.5, 1.0];
              return (
                <div key={i} className="flex-1 min-w-[80px] text-center">
                  <div className="text-lg font-bold" style={{color: dimColor}}>{i+1}</div>
                  <div className="text-[10px] text-gray-500 dark:text-gray-400 leading-tight">{op.replace(/^\d+\s*/, '')}</div>
                  <div className="text-[10px] font-mono text-orange-600 dark:text-orange-400 mt-0.5">= {scores[i].toFixed(1)}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // Confianca
    if (q.tipo === 'Confianca') {
      const scores = [1.0, 2.0, 3.0, 3.5, 2.0];
      return (
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-red-300 dark:border-red-700">
          <div className="flex items-center gap-2 mb-2">
            <div className="text-xs font-semibold text-gray-500 dark:text-gray-400">Escala de Confianca (1-5)</div>
            <span className="text-[10px] px-1.5 py-0.5 rounded bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400 font-bold">(penaliza confianca excessiva)</span>
          </div>
          <div className="flex flex-wrap gap-2 justify-between">
            {q.opcoes.map((op, i) => (
              <div key={i} className={`flex-1 min-w-[80px] text-center ${i === 4 ? 'bg-red-50 dark:bg-red-900/20 rounded-lg p-1' : ''}`}>
                <div className="text-lg font-bold" style={{color: i === 4 ? '#EF4444' : dimColor}}>{i+1}</div>
                <div className="text-[10px] text-gray-500 dark:text-gray-400 leading-tight">{op.replace(/^\d+\s*/, '')}</div>
                <div className={`text-[10px] font-mono mt-0.5 ${i === 4 ? 'text-red-600 dark:text-red-400 font-bold' : 'text-gray-400'}`}>= {scores[i].toFixed(1)}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Cenario
    if (q.tipo === 'Cenario') {
      const convMap = {};
      if (q.conversao) {
        q.conversao.split(',').forEach(pair => {
          const [key, val] = pair.trim().split('=');
          convMap[key.trim()] = parseFloat(val.trim());
        });
      }
      return (
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-gray-200 dark:border-gray-600">
          <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Opcoes do cenario</div>
          <div className="space-y-1.5">
            {q.opcoes.map((op, i) => {
              const letter = op.match(/^([a-e])\)/);
              const scoreVal = letter ? convMap[letter[1]] : null;
              return (
                <div key={i} className="flex items-center gap-2 text-sm">
                  <span className="text-gray-700 dark:text-gray-300 flex-1">{op}</span>
                  {scoreVal !== null && scoreVal !== undefined && (
                    <span className="text-xs font-mono px-2 py-0.5 rounded-full bg-gray-200 dark:bg-gray-600 text-gray-600 dark:text-gray-300 shrink-0">
                      score = {scoreVal.toFixed(1)}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // Escala (Q44, Q49, Q51)
    if (q.tipo === 'Escala') {
      return (
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-gray-200 dark:border-gray-600">
          <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Opcoes da escala</div>
          <div className="space-y-1.5">
            {q.opcoes.map((op, i) => (
              <div key={i} className="flex items-center gap-2 text-sm">
                <span className="text-gray-700 dark:text-gray-300">{op}</span>
              </div>
            ))}
          </div>
          {q.conversao && (
            <div className="mt-2 pt-2 border-t border-gray-200 dark:border-gray-600">
              <code className="text-[10px] text-gray-500 dark:text-gray-400">{q.conversao}</code>
            </div>
          )}
        </div>
      );
    }

    // Descritiva / Mapa / Multipla escolha / others with opcoes
    if (q.tipo === 'Descritiva' || q.tipo === 'Mapa' || q.tipo === 'Roteador' || q.tipo === 'Segmentacao' || q.tipo === 'Controle') {
      const isMultiple = q.textoCompleto && (q.textoCompleto.includes('marque todas') || q.textoCompleto.includes('marque a principal'));
      return (
        <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-gray-200 dark:border-gray-600">
          <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">{isMultiple ? 'Multipla escolha' : 'Opcoes de resposta'}</div>
          <div className="space-y-1">
            {q.opcoes.map((op, i) => (
              <div key={i} className="flex items-center gap-2 text-sm">
                {isMultiple ? (
                  <span className="w-4 h-4 rounded border-2 border-gray-300 dark:border-gray-500 shrink-0 flex items-center justify-center text-[10px] text-gray-400">&#10003;</span>
                ) : (
                  <span className="w-3 h-3 rounded-full border-2 border-gray-300 dark:border-gray-500 shrink-0"></span>
                )}
                <span className="text-gray-700 dark:text-gray-300">{op}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Fallback
    return (
      <div className="bg-gray-50 dark:bg-gray-700/30 rounded-lg p-3 border border-gray-200 dark:border-gray-600">
        <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Opcoes de resposta</div>
        <div className="space-y-1">
          {q.opcoes.map((op, i) => (
            <div key={i} className="text-sm text-gray-700 dark:text-gray-300">{op}</div>
          ))}
        </div>
      </div>
    );
  }

  function renderQuestion(q) {
    const isExp = expanded === q.id;
    const dimColor = DIM_COLORS[q.dimensao] || '#6B7280';
    return (
      <div key={q.id} className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden hover:shadow-md transition-all">
        <button onClick={() => setExpanded(isExp ? null : q.id)} className="w-full text-left p-3 flex items-start gap-3">
          {/* Dimension badge (large, colored) */}
          <div className="shrink-0 flex flex-col items-center gap-1">
            <span className="inline-flex items-center justify-center rounded-lg font-bold text-white text-[10px] px-2 py-1 leading-tight" style={{backgroundColor: dimColor}}>
              {q.dimensao}
            </span>
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-baseline gap-2 mb-1">
              <span className="text-base font-mono font-extrabold" style={{color: dimColor}}>{q.id}</span>
              <span className="text-sm text-gray-700 dark:text-gray-300">{q.texto}</span>
            </div>
            <div className="flex flex-wrap gap-1">
              {!showingAllFases && <Badge text={`Fase ${q.fase}`} color={getFaseBadgeColor(q.fase)} small/>}
              <Badge text={q.tipo} color="#6B7280" small/>
              <Badge text={q.scoring} color={getScoringColor(q.scoring)} small/>
              {q.transicao && <Badge text={q.transicao} color="#6B7280" small/>}
            </div>
          </div>
          <svg className={`w-5 h-5 text-gray-400 shrink-0 transition-transform ${isExp?'rotate-180':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M19 9l-7 7-7-7"/></svg>
        </button>
        {isExp && (
          <div className="px-4 pb-4 border-t border-gray-100 dark:border-gray-700 fade-in">
            <div className="mt-3 space-y-4">
              {/* 1. Texto completo em destaque */}
              <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-3">
                <div className="text-xs font-semibold text-gray-400 mb-1">Texto completo da pergunta</div>
                <div className="text-sm font-semibold text-gray-800 dark:text-gray-100 leading-relaxed">{q.textoCompleto || q.texto}</div>
              </div>

              {/* 2. Por que esta pergunta e importante */}
              {q.importa && (
                <div className="rounded-lg p-3 border" style={{backgroundColor: dimColor + '10', borderColor: dimColor + '40'}}>
                  <h4 className="text-xs font-semibold mb-1" style={{color: dimColor}}>Por que esta pergunta e importante</h4>
                  <p className="text-sm" style={{color: dimColor + 'DD'}}>{q.importa}</p>
                </div>
              )}

              {/* 3. Opcoes de resposta */}
              {q.opcoes !== undefined && renderOpcoes(q)}

              {/* 4. Badges: tipo, scoring, transicao */}
              <div className="flex flex-wrap gap-2">
                <Badge text={q.dimensao} color={dimColor}/>
                <Badge text={q.tipo} color="#6B7280"/>
                <Badge text={q.scoring} color={getScoringColor(q.scoring)}/>
                {q.transicao && <Badge text={'Nivel ' + q.transicao} color="#6B7280"/>}
                {q.conversao && (
                  <span className="inline-flex items-center rounded-full font-medium px-2.5 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 font-mono">
                    {q.conversao}
                  </span>
                )}
              </div>

              {/* 5. Hipoteses CSD clicaveis */}
              {q.hipoteses.length > 0 && (
                <div>
                  <div className="text-xs font-semibold text-gray-500 mb-2">Hipoteses CSD que valida</div>
                  <div className="flex flex-wrap gap-1.5">
                    {q.hipoteses.map(hid => {
                      const hip = [...SUPOSICOES, ...DUVIDAS].find(h => h.id === hid);
                      return (
                        <button key={hid} onClick={e=>{e.stopPropagation();onOpenDrawer('hipotese',hid)}} className="text-xs px-2.5 py-1.5 rounded-lg bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 hover:bg-purple-100 dark:hover:bg-purple-900/50 transition font-medium text-left">
                          <span className="font-bold">{hid}</span>
                          {hip && <span className="ml-1 text-purple-400 dark:text-purple-500">{hip.titulo}</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    );
  }

  return (

        <select value={filterDim} onChange={e=>setFilterDim(e.target.value)} className="text-sm border rounded-lg px-3 py-1.5 bg-white dark:bg-gray-800 dark:border-gray-700">
          <option value="Todas">Todas dimensoes</option>

          <option value="Estendido">Score Estendido</option>
          <option value="Nenhum">Nao entra</option>
        </select>
      </div>

      <div className="text-xs text-gray-500">{filtered.length} perguntas encontradas</div>

      {/* Grouped by phase */}
      {showingAllFases ? (
        <div className="space-y-6">
          {FASE_ORDER.map(fase => {
            const meta = FASE_META[fase];
            const qs = grouped[fase];
            if (!qs || qs.length === 0) return null;
            const isCollapsed = collapsedFases[fase];
            return (
              <div key={fase}>
                {/* Phase header */}
                <button
                  onClick={() => toggleFase(fase)}
                  className="w-full text-left mb-3 group"
                >
                  <div className="flex items-center gap-3 p-3 rounded-xl transition-all hover:shadow-md" style={{backgroundColor: meta.cor + '12', border: `2px solid ${meta.cor}40`}}>
                    <div className="w-9 h-9 rounded-lg flex items-center justify-center text-white font-bold text-sm shrink-0" style={{backgroundColor: meta.cor}}>
                      {meta.icon}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-sm" style={{color: meta.cor}}>{meta.nome}</div>
                      <div className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">{meta.desc}</div>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{backgroundColor: meta.cor + '20', color: meta.cor}}>
                        {qs.length} {qs.length === 1 ? 'pergunta' : 'perguntas'}
                      </span>
                      <svg className={`w-5 h-5 transition-transform ${isCollapsed ? '' : 'rotate-180'}`} style={{color: meta.cor}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M19 9l-7 7-7-7"/></svg>
                    </div>
                  </div>
                </button>
                {/* Questions */}
                {!isCollapsed && (
                  <div className="space-y-2 ml-2 pl-4" style={{borderLeft: `3px solid ${meta.cor}30`}}>
                    {qs.map(q => renderQuestion(q))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(q => renderQuestion(q))}
        </div>
      )}
    </div>
  );
}

// VIEW 5: SCORING

function ScoringView() {
  const [simDim, setSimDim] = useState('Utilizacao');
  const [simAnswers, setSimAnswers] = useState({});

  const simQuestions = useMemo(() => {
    const comum = (SCORE_COMUM_MAP[simDim] || []).map(id => PERGUNTAS.find(q=>q.id===id)).filter(Boolean);
    const ext = (SCORE_ESTENDIDO_MAP[simDim] || []).map(id => PERGUNTAS.find(q=>q.id===id)).filter(Boolean);
    return { comum, ext };
  }, [simDim]);

  const simResult = useMemo(() => {
    const allQs = [...simQuestions.comum, ...simQuestions.ext];
    const scores = [];
    allQs.forEach(q => {
      const ans = simAnswers[q.id];
      if (ans === undefined || ans === '' || isNaN(ans)) return;
      let conv = getConversion(q);
      if (conv) {
        const found = conv.find(c => c.r === ans);
        if (found) scores.push(found.s);
      } else {
        // Cenario/Escala: o valor selecionado JA e o score
        scores.push(parseFloat(ans));
      }
    });
    if (scores.length === 0) return null;
    const avg = scores.reduce((a,b)=>a+b,0) / scores.length;
    return { avg: avg.toFixed(2), nivel: getNivel(avg), count: scores.length, total: allQs.length };
  }, [simAnswers, simQuestions]);

  function resetSim() {
    setSimAnswers({});
  }

  function ConversionTable({ title, data, highlight }) {
    return (
      <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">

          <thead>
            <tr>
              <th className="py-1.5 text-gray-500 font-bold">Resposta</th>
              {data.map(d => <th key={d.r} className="py-1.5 text-gray-500 font-bold">{d.r}</th>)}
            </tr>
          </thead>
          <tbody>
            <tr>
              <td className="py-1.5 text-gray-500 font-bold">Score</td>
              {data.map(d => (
                <td key={d.r+'s'} className="py-1.5">
                  <span className={`inline-block px-2 py-0.5 rounded font-bold ${highlight && d.r===5 ? 'bg-red-100 dark:bg-red-900/30 text-red-600' : 'bg-gray-100 dark:bg-gray-700'}`}>
                    {d.s.toFixed(1)}
                  </span>
                </td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
    );

  const [scoreTab, setScoreTab] = useState('como');

    { id:'como', label:'Como funciona' },

        {scoreTabs.map(t => (
          <button key={t.id} onClick={() => setScoreTab(t.id)}

            {t.label}
          </button>
        ))}
      </div>

      {/* TAB: Como funciona */}
      {scoreTab === 'como' && (
        <div className="space-y-6 fade-in">
          {/* Fluxo visual */}

            <div className="flex flex-col md:flex-row items-stretch gap-0">
              {[
                { icon:'📝', title:'Resposta bruta', desc:'Likert 1-5, cenario, escala', cor:'#3B82F6' },
                { icon:'🔄', title:'Conversao', desc:'Resposta → score 1.0 a 4.0', cor:'#8B5CF6' },
                { icon:'📊', title:'Score dimensao', desc:'Media dos itens', cor:'#10B981' },
                { icon:'🎯', title:'Nivel Matriz', desc:'Faixas de corte', cor:'#F59E0B' },

const CENARIO_OPTIONS = {
  Q23: [{label:'d) Nao saberia',s:1},{label:'a) Peco direto',s:2},{label:'b) Verifico dados',s:3},{label:'c) Estruturo e verifico',s:4}],
  Q25: [{label:'a) Cola direto',s:1},{label:'e) Nao saberia avaliar',s:1},{label:'d) Nao usaria IA',s:2},{label:'b) Remove sensiveis',s:3},{label:'c) Ferramenta interna',s:4}],
  Q29: [{label:'a) Envia direto',s:1},{label:'d) Nao usaria IA',s:2},{label:'b) Leio por cima',s:2.5},{label:'c) Reviso criticamente',s:4}],
  Q43: [{label:'a) Primeiro resultado',s:1},{label:'b) Ajusto prompt',s:2.5},{label:'d) Refaco manualmente',s:3},{label:'c) Combino fontes',s:4}],
  Q44: [{label:'Nunca tentei',s:1},{label:'Nao visualizo como',s:1},{label:'Sei que seria possivel',s:2},{label:'Sim, uma vez',s:3},{label:'Sim, mais de uma vez',s:4}],
  Q48: [{label:'e) Nao saberia priorizar',s:1},{label:'d) O que o time pede',s:2},{label:'a) Economia de custo',s:2.5},{label:'b) Experiencia do cliente',s:3},{label:'c) Receita/diferenciacao',s:4}],
  Q49: [{label:'d) Nao penso nisso',s:1},{label:'e) Quero mas nao sei',s:1.5},{label:'c) Informalmente',s:2},{label:'b) Anoto sem processo',s:3},{label:'a) Processo estruturado',s:4}],
  Q51: [{label:'Nao',s:1},{label:'Pretendo fazer',s:2},{label:'Informais/verbais',s:3},{label:'Formais documentadas',s:4}],
};

function SimQuestion({ q, value, onChange }) {
  const conv = getConversion(q);
  const isLikertType = conv !== null;
  const cenarioOpts = CENARIO_OPTIONS[q.id];
  const isCenario = cenarioOpts !== undefined;

  return (
    <div className="flex flex-col sm:flex-row sm:items-center gap-2 py-2 border-b border-gray-100 dark:border-gray-700/50">
      <div className="flex items-center gap-2 flex-1 min-w-0">
        <span className="text-xs font-mono font-bold text-gray-400 shrink-0">{q.id}</span>
        <span className="text-sm truncate">{q.texto}</span>
        {q.tipo !== 'Likert' && <Badge text={q.tipo} color="#6B7280" small/>}
      </div>
      <div className="shrink-0">
        {isLikertType ? (
          <div className="flex gap-1">
            {[1,2,3,4,5].map(o => (
              <button
                key={o}
                onClick={() => onChange(o)}
                className={`w-8 h-8 rounded-lg text-xs font-bold transition ${value===o ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'}`}
              >
                {o}
              </button>
            ))}
          </div>
        ) : isCenario ? (
          <select
            value={value ?? ''}
            onChange={e => onChange(parseFloat(e.target.value))}
            className="border rounded-lg px-2 py-1.5 text-xs bg-white dark:bg-gray-700 dark:border-gray-600 max-w-[240px]"
          >
            <option value="">Selecione...</option>
            {cenarioOpts.map((o,i) => <option key={i} value={o.s}>{o.label} (={o.s})</option>)}
          </select>
        ) : (
          <select
            value={value ?? ''}
            onChange={e => onChange(parseFloat(e.target.value))}
            className="border rounded-lg px-2 py-1 text-sm bg-white dark:bg-gray-700 dark:border-gray-600"
          >
            <option value="">--</option>
            {[1,1.5,2,2.5,3,3.5,4].map(o => <option key={o} value={o}>{o.toFixed(1)}</option>)}
          </select>
        )}
      </div>
      {value !== undefined && value !== '' && (
        <div className="text-xs text-gray-500 shrink-0 w-16 text-right font-mono">
          = {isLikertType ? (conv.find(c=>c.r===value)?.s.toFixed(1) || '?') : parseFloat(value).toFixed(1)}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// VIEW 6: CONEXÕES
// ═══════════════════════════════════════════
function ConexoesView({ onOpenDrawer }) {
  const [filterDim, setFilterDim] = useState('Todas');
  const [highlight, setHighlight] = useState(null);
  const svgRef = useRef(null);

  const objetivos = ['Diagnosticar','Priorizar','Multiplicadores','Backlog','Exec. Report'];
  const dimList = filterDim === 'Todas' ? DIMENSIONS : [filterDim];
  const hipList = useMemo(() => {
    if (filterDim === 'Todas') return SUPOSICOES;
    return SUPOSICOES.filter(s => s.dimensao === filterDim);
  }, [filterDim]);
  const qList = useMemo(() => {
    const qIds = new Set();
    hipList.forEach(h => h.validacao.forEach(q => qIds.add(q)));
    return PERGUNTAS.filter(q => qIds.has(q.id));
  }, [hipList]);
  const scoreList = useMemo(() => {
    const dims = filterDim === 'Todas' ? DIMENSIONS : [filterDim];
    return dims.filter(d => SCORE_COMUM_MAP[d]);
  }, [filterDim]);

  function isHighlighted(type, id) {
    if (!highlight) return true;
    if (highlight.type === type && highlight.id === id) return true;
    if (highlight.type === 'hipotese') {
      const h = SUPOSICOES.find(s => s.id === highlight.id);
      if (!h) return false;
      if (type === 'dimensao') return h.dimensao === id;
      if (type === 'pergunta') return h.validacao.includes(id);
      if (type === 'score') return h.dimensao === id;
    }
    if (highlight.type === 'dimensao') {
      if (type === 'hipotese') {
        const h = SUPOSICOES.find(s => s.id === id);
        return h && h.dimensao === highlight.id;
      }
      if (type === 'pergunta') {
        const q = PERGUNTAS.find(q => q.id === id);
        return q && q.dimensao === highlight.id;
      }
      if (type === 'score') return id === highlight.id;
    }
    if (highlight.type === 'pergunta') {
      if (type === 'hipotese') {
        const h = SUPOSICOES.find(s => s.id === id);
        return h && h.validacao.includes(highlight.id);
      }
      if (type === 'dimensao') {
        const q = PERGUNTAS.find(q => q.id === highlight.id);
        return q && q.dimensao === id;
      }
    }
    return false;
  }

  return (
    <div className="fade-in space-y-6">
      <h2 className="text-lg font-bold">Mapa de Conexoes</h2>
      <div className="flex flex-wrap gap-3 items-center">
        <select value={filterDim} onChange={e=>{setFilterDim(e.target.value);setHighlight(null);}} className="text-sm border rounded-lg px-3 py-1.5 bg-white dark:bg-gray-800 dark:border-gray-700">
          <option value="Todas">Todas dimensoes</option>
          {DIMENSIONS.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        {highlight && <button onClick={()=>setHighlight(null)} className="text-xs text-blue-600 hover:underline">Limpar destaque</button>}
      </div>
      <p className="text-xs text-gray-500">Clique em qualquer item para destacar suas conexoes.</p>

      {/* Connection diagram */}
      <div className="overflow-x-auto">
        <div className="min-w-[900px] grid grid-cols-5 gap-4">
          {/* Col 1: Objetivos */}
          <div>
            <div className="text-xs font-bold text-gray-500 uppercase mb-2 text-center">Objetivo</div>
            <div className="space-y-2">
              {objetivos.map((o,i) => (
                <div key={i} className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-2 text-xs text-center font-medium text-blue-700 dark:text-blue-300">
                  {o}
                </div>
              ))}
            </div>
          </div>

          {/* Col 2: Dimensões */}
          <div>
            <div className="text-xs font-bold text-gray-500 uppercase mb-2 text-center">Dimensao</div>
            <div className="space-y-2">
              {dimList.map(d => (
                <button
                  key={d}
                  onClick={() => setHighlight(highlight?.type==='dimensao' && highlight?.id===d ? null : {type:'dimensao',id:d})}
                  className={`w-full rounded-lg p-2 text-xs text-center font-bold text-white transition-all ${isHighlighted('dimensao',d) ? 'opacity-100 shadow-md' : 'opacity-30'}`}
                  style={{backgroundColor:DIM_COLORS[d]}}
                >
                  {d}
                </button>
              ))}
            </div>
          </div>

          {/* Col 3: Hipóteses */}
          <div>
            <div className="text-xs font-bold text-gray-500 uppercase mb-2 text-center">Hipotese</div>
            <div className="space-y-2">
              {hipList.map(h => (
                <button
                  key={h.id}
                  onClick={() => setHighlight(highlight?.type==='hipotese' && highlight?.id===h.id ? null : {type:'hipotese',id:h.id})}
                  className={`w-full rounded-lg p-2 text-xs text-left transition-all border ${isHighlighted('hipotese',h.id) ? 'opacity-100 shadow-md' : 'opacity-30'} bg-white dark:bg-gray-800`}
                  style={{borderColor:DIM_COLORS[h.dimensao] || '#6B7280'}}
                >
                  <span className="font-bold">{h.id}</span>
                  <span className="ml-1 text-gray-500 dark:text-gray-400">{h.titulo.substring(0,25)}...</span>
                </button>
              ))}
            </div>
          </div>

          {/* Col 4: Perguntas */}
          <div>
            <div className="text-xs font-bold text-gray-500 uppercase mb-2 text-center">Pergunta</div>
            <div className="space-y-2">
              {qList.map(q => (
                <button
                  key={q.id}
                  onClick={() => {setHighlight(highlight?.type==='pergunta' && highlight?.id===q.id ? null : {type:'pergunta',id:q.id})}}
                  className={`w-full rounded-lg p-2 text-xs text-left transition-all border border-gray-200 dark:border-gray-700 ${isHighlighted('pergunta',q.id) ? 'opacity-100 shadow-md' : 'opacity-30'} bg-white dark:bg-gray-800`}
                >
                  <span className="font-bold">{q.id}</span>
                  <span className="ml-1 text-gray-500 dark:text-gray-400">{q.texto.substring(0,22)}...</span>
                </button>
              ))}
            </div>
          </div>

          {/* Col 5: Score */}
          <div>
            <div className="text-xs font-bold text-gray-500 uppercase mb-2 text-center">Score</div>
            <div className="space-y-2">
              {scoreList.map(d => (
                <div
                  key={d}
                  className={`rounded-lg p-2 text-xs text-center font-bold text-white transition-all ${isHighlighted('score',d) ? 'opacity-100 shadow-md' : 'opacity-30'}`}
                  style={{backgroundColor:DIM_COLORS[d]}}
                >
                  {d}
                  <div className="text-[10px] opacity-75 font-normal mt-0.5">
                    {(SCORE_COMUM_MAP[d]||[]).length} + {(SCORE_ESTENDIDO_MAP[d]||[]).length} itens
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// DRAWER CONTENT
// ═══════════════════════════════════════════
function DrawerContent({ type, id, onNavigate, onOpenDrawer }) {
  if (type === 'pergunta') {
    const q = PERGUNTAS.find(p => p.id === id);
    if (!q) return <div>Pergunta nao encontrada.</div>;
    const conv = getConversion(q);
    return (
      <div className="space-y-4">
        <Badge text={q.dimensao} color={DIM_COLORS[q.dimensao] || '#6B7280'}/>
        <div>
          <div className="text-xs font-semibold text-gray-500 mb-1">Texto</div>
          <div className="text-sm">{q.texto}</div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-1">Fase</div>
            <Badge text={`Fase ${q.fase}`} color="#6B7280"/>
          </div>
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-1">Tipo</div>
            <Badge text={q.tipo} color="#6B7280"/>
          </div>
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-1">Scoring</div>
            <Badge text={q.scoring} color={q.scoring==='Comum'?'#10B981':q.scoring==='Estendido'?'#F59E0B':'#94A3B8'}/>
          </div>
          {q.transicao && (
            <div>
              <div className="text-xs font-semibold text-gray-500 mb-1">Transicao</div>
              <Badge text={q.transicao} color="#6B7280"/>
            </div>
          )}
        </div>
        {q.conversao && (
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-1">Conversao</div>
            <code className="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded block">{q.conversao}</code>
          </div>
        )}
        {conv && (
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-1">Tabela de conversao</div>
            <div className="flex gap-2 text-xs">
              {conv.map(c => (
                <div key={c.r} className="text-center bg-gray-50 dark:bg-gray-700 rounded p-1.5 flex-1">
                  <div className="text-gray-400">{c.r}</div>
                  <div className="font-bold">{c.s.toFixed(1)}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        {q.hipoteses.length > 0 && (
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-1">Hipoteses CSD</div>
            <div className="flex flex-wrap gap-1">
              {q.hipoteses.map(hid => (
                <button key={hid} onClick={()=>onOpenDrawer('hipotese',hid)} className="text-xs px-2.5 py-1 rounded-full bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 hover:bg-purple-100 transition font-medium">
                  {hid}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  if (type === 'hipotese') {
    const all = [...SUPOSICOES, ...DUVIDAS];
    const h = all.find(x => x.id === id);
    if (!h) return <div>Hipotese nao encontrada.</div>;
    return (
      <div className="space-y-4">
        <div className="flex flex-wrap gap-1.5">
          <Badge text={h.prioridade} color={PRIO_COLORS[h.prioridade]}/>
          <Badge text={h.dimensao} color={DIM_COLORS[h.dimensao] || '#6B7280'}/>
          {h.cluster && <Badge text={h.cluster} color={CLUSTER_COLORS[h.cluster]}/>}
          {h.transicao && <Badge text={h.transicao} color="#6B7280"/>}
        </div>
        <div>
          <div className="text-xs font-semibold text-gray-500 mb-1">Titulo</div>
          <div className="text-sm font-medium">{h.titulo}</div>
        </div>
        <div>
          <div className="text-xs font-semibold text-gray-500 mb-1">Perguntas que validam</div>
          <div className="flex flex-wrap gap-1.5">
            {h.validacao.map(qid => (
              <button key={qid} onClick={()=>onOpenDrawer('pergunta',qid)} className="text-xs px-2.5 py-1 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 transition font-medium">
                {qid}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App() {
  const [dark, setDark] = useState(false);
  const [tab, setTab] = useState('Visao Geral');
  const [drawer, setDrawer] = useState(null);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  const openDrawer = useCallback((type, id) => {
    setDrawer({ type, id });
  }, []);

  const closeDrawer = useCallback(() => {
    setDrawer(null);
  }, []);

  function renderView() {
    switch(tab) {
      case 'Visao Geral': return <VisaoGeral onNavigate={setTab}/>;
      case 'Matriz': return <MatrizView onOpenDrawer={openDrawer}/>;
      case 'Hipoteses': return <HipotesesView onOpenDrawer={openDrawer}/>;
      case 'Perguntas': return <PerguntasView onOpenDrawer={openDrawer}/>;
      case 'Scoring': return <ScoringView/>;
      case 'Conexoes': return <ConexoesView onOpenDrawer={openDrawer}/>;
      default: return null;
    }
  }

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-950 transition-colors duration-300">
      <Header dark={dark} toggleDark={() => setDark(!dark)}/>
      <div className="max-w-7xl mx-auto px-4 py-4">
        <TabNav active={tab} onChange={setTab}/>
        <div className="mt-6 pb-12">
          {renderView()}
        </div>
      </div>
      <Drawer
        open={!!drawer}
        onClose={closeDrawer}
        title={drawer ? `${drawer.id}` : ''}
      >
        {drawer && (
          <DrawerContent
            type={drawer.type}
            id={drawer.id}
            onNavigate={setTab}
            onOpenDrawer={openDrawer}
          />
        )}
      </Drawer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
