const STORAGE_KEY = 'swift-ia-pesquisa-v3';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, savedAt: new Date().toISOString() }));
  } catch(e) {}
}

function ProgressBar({ current, total }) {
  const pct = Math.round((current / total) * 100);
  return (
    <div className="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
      <div
        className="h-full rounded-full transition-all duration-500 ease-out"
        style={{ width: `${pct}%`, background: 'linear-gradient(90deg, #3B82F6, #8B5CF6)' }}
      />
    </div>
  );
}

function LikertQuestion({ value, onChange }) {
  return (
    <div className="flex flex-wrap gap-2 mt-3">
      {LIKERT_LABELS.map(l => (
        <button
          key={l.value}
          onClick={() => onChange(l.value)}
          className={`flex-1 min-w-[100px] py-3 px-2 rounded-xl text-center transition-all border-2 ${
            value === l.value
              ? 'bg-blue-600 text-white border-blue-600 shadow-md scale-[1.02]'
              : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300 hover:bg-blue-50'
          }`}
        >
          <div className="text-lg font-bold">{l.value}</div>
          <div className="text-[10px] leading-tight mt-0.5">{l.label}</div>
        </button>
      ))}
    </div>
  );
}

function RadioQuestion({ opcoes, value, onChange }) {
  return (
    <div className="space-y-2 mt-3">
      {opcoes.map((op, i) => {
        const val = typeof op === 'object' ? op.value : op;
        const label = typeof op === 'object' ? op.label : op;
        const isSelected = value === val;
        return (
          <button
            key={i}
            onClick={() => onChange(val)}
            className={`w-full text-left p-3 rounded-xl transition-all border-2 flex items-center gap-3 ${
              isSelected
                ? 'bg-blue-50 border-blue-500 text-blue-800'
                : 'bg-white border-gray-200 text-gray-700 hover:border-blue-300 hover:bg-blue-50/50'
            }`}
          >
            <div className={`w-5 h-5 rounded-full border-2 shrink-0 flex items-center justify-center ${
              isSelected ? 'border-blue-500' : 'border-gray-300'
            }`}>
              {isSelected && <div className="w-3 h-3 rounded-full bg-blue-500"/>}
            </div>
            <span className="text-sm">{label}</span>
          </button>
        );
      })}
    </div>
  );
}

        return (

            className={`w-full text-left p-3.5 rounded-xl transition-all border-2 ${

                ? 'bg-purple-50 border-purple-500 text-purple-800'
                : 'bg-white border-gray-200 text-gray-700 hover:border-purple-300 hover:bg-purple-50/50'
            }`}
          >
            <span className="text-sm">{op}</span>
          </button>
        );
      })}
    </div>
  );
}

function CheckboxQuestion({ opcoes, value, onChange, exclusive }) {
  const selected = value || [];
  function toggle(op) {
    if (op === exclusive) {
      // Clicking exclusive option: deselect everything else
      if (selected.includes(op)) {
        onChange([]);
      } else {
        onChange([op]);
      }
    } else {
      // Clicking normal option: remove exclusive if present
      let next = selected.filter(v => v !== exclusive);
      if (next.includes(op)) {
        next = next.filter(v => v !== op);
      } else {
        next = [...next, op];
      }
      onChange(next);
    }
  }
  return (
    <div className="space-y-2 mt-3">
      <div className="text-xs text-gray-400 mb-1">Selecione todas que se aplicam</div>
      {opcoes.map((op, i) => {
        const isSelected = selected.includes(op);
        return (
          <button
            key={i}
            onClick={() => toggle(op)}
            className={`w-full text-left p-3 rounded-xl transition-all border-2 flex items-center gap-3 ${
              isSelected
                ? 'bg-blue-50 border-blue-500 text-blue-800'
                : 'bg-white border-gray-200 text-gray-700 hover:border-blue-300'
            }`}
          >
            <div className={`w-5 h-5 rounded shrink-0 flex items-center justify-center border-2 text-white text-xs ${
              isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300'
            }`}>
              {isSelected && '✓'}
            </div>
            <span className="text-sm">{op}</span>
          </button>
        );
      })}
    </div>
  );
}

function CpfQuestion({ value, onChange }) {
  function handleChange(e) {
    const raw = e.target.value.replace(/\D/g, '').slice(0, 11);
    onChange(raw);
  }
  function formatCpf(v) {
    if (!v) return '';
    if (v.length <= 3) return v;
    if (v.length <= 6) return v.slice(0,3) + '.' + v.slice(3);
    if (v.length <= 9) return v.slice(0,3) + '.' + v.slice(3,6) + '.' + v.slice(6);
    return v.slice(0,3) + '.' + v.slice(3,6) + '.' + v.slice(6,9) + '-' + v.slice(9);
  }
  const isValid = value && value.length === 11;
  return (
    <div className="mt-3">
      <input
        type="text"
        inputMode="numeric"
        value={formatCpf(value || '')}
        onChange={handleChange}
        placeholder="000.000.000-00"
        className={`w-full max-w-xs text-center text-2xl font-mono tracking-wider py-4 px-4 rounded-xl border-2 focus:outline-none transition-all ${
          isValid
            ? 'border-green-400 bg-green-50 focus:ring-2 focus:ring-green-300'
            : 'border-gray-300 bg-white focus:ring-2 focus:ring-blue-300 focus:border-blue-400'
        }`}
      />
      {value && value.length > 0 && !isValid && (
        <p className="text-xs text-amber-600 mt-2">CPF deve ter 11 dígitos</p>
      )}
      {isValid && (
        <p className="text-xs text-green-600 mt-2">CPF válido</p>
      )}
    </div>
  );
}

        rows={3}

function QuestionCard({ pergunta, answer, onAnswer, visible }) {

      <div className="flex items-start gap-3">
        <span className="text-xs font-mono font-bold text-gray-300 mt-1 shrink-0">{pergunta.id !== 'ROUTE' ? pergunta.id : ''}</span>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-medium text-gray-800 leading-relaxed">{pergunta.texto}</p>

          {pergunta.tipo === 'cpf' && <CpfQuestion value={answer} onChange={v => onAnswer(pergunta.id, v)}/>}
          {pergunta.tipo === 'likert' && <LikertQuestion value={answer} onChange={v => onAnswer(pergunta.id, v)}/>}
          {pergunta.tipo === 'radio' && <RadioQuestion opcoes={pergunta.opcoes} value={answer} onChange={v => onAnswer(pergunta.id, v)}/>}
          {pergunta.tipo === 'routing' && <RadioQuestion opcoes={pergunta.opcoes} value={answer} onChange={v => onAnswer(pergunta.id, v)}/>}
          {pergunta.tipo === 'cenario' && <CenarioQuestion opcoes={pergunta.opcoes} value={answer} onChange={v => onAnswer(pergunta.id, v)}/>}
          {pergunta.tipo === 'checkbox' && <CheckboxQuestion opcoes={pergunta.opcoes} value={answer} onChange={v => onAnswer(pergunta.id, v)} exclusive={pergunta.exclusive}/>}
          {pergunta.tipo === 'aberta' && <AbertaQuestion value={answer} onChange={v => onAnswer(pergunta.id, v)} obrigatoria={pergunta.obrigatoria}/>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App() {
  const saved = useMemo(() => loadState(), []);

  const [page, setPage] = useState(saved?.page || 0);
  const [answers, setAnswers] = useState(saved?.answers || {});
  const [completed, setCompleted] = useState(saved?.completed || false);
  const [showResume, setShowResume] = useState(saved && saved.page > 0 && !saved.completed);
  const topRef = useRef(null);

  // Determine which pages are active based on cluster routing
  const activePages = useMemo(() => {
    const cluster = answers['ROUTE'];
    return PAGES.filter(p => {
      if (p.cluster === 'execucao' && cluster !== 'execucao') return false;
      if (p.cluster === 'gestao' && cluster !== 'gestao') return false;
      return true;
    });
  }, [answers['ROUTE']]);

  const currentPage = activePages[page] || activePages[0];
  const totalPages = activePages.length;

  // Save on every change
  useEffect(() => {
    saveState({ page, answers, completed });
  }, [page, answers, completed]);

  function handleAnswer(qId, value) {
    setAnswers(prev => ({ ...prev, [qId]: value }));
  }

  function isQuestionVisible(pergunta) {
    if (pergunta.dependeDe) {
      const depAnswer = answers[pergunta.dependeDe.q];
      if (depAnswer !== pergunta.dependeDe.valor) return false;
    }
    return true;
  }

  function getVisibleQuestions() {
    if (!currentPage) return [];
    return currentPage.perguntas.filter(p => isQuestionVisible(p));
  }

  // Auto-skip pages with no visible questions
  useEffect(() => {
    if (currentPage && !currentPage.isWelcome) {
      const visible = getVisibleQuestions();
      if (visible.length === 0 && page > 0 && page < totalPages - 1) {
        setPage(page + 1);
      }
    }
  }, [page, answers]);

  function isPageComplete() {
    if (currentPage.isWelcome) return true;
    const visible = getVisibleQuestions();
    if (visible.length === 0) return true;
    return visible.every(p => {
      const ans = answers[p.id];
      const hasAnswer = ans !== undefined && ans !== null && ans !== '' && (Array.isArray(ans) ? ans.length > 0 : true);

      // CPF must be 11 digits
      if (p.tipo === 'cpf') return ans && ans.length === 11;

      // Optional open questions are always "complete"; mandatory need answer
      if (p.tipo === 'aberta' && !p.obrigatoria) return true;
      if (p.tipo === 'aberta' && p.obrigatoria) return hasAnswer;

      // Routing needs answer
      if (p.id === 'ROUTE') return hasAnswer;

      // All others: just need answer
      return hasAnswer;
    });
  }

  function goNext() {
    if (page < totalPages - 1) {
      setPage(page + 1);
      topRef.current?.scrollIntoView({ behavior: 'smooth' });
    } else {
      setCompleted(true);
    }
  }

  function goPrev() {
    if (page > 0) {
      // Skip back over empty pages
      let target = page - 1;
      while (target > 0) {
        const targetPage = activePages[target];
        if (targetPage && !targetPage.isWelcome) {
          const vis = targetPage.perguntas.filter(p => {
            if (p.dependeDe) return answers[p.dependeDe.q] === p.dependeDe.valor;
            return true;
          });
          if (vis.length === 0) { target--; continue; }
        }
        break;
      }
      setPage(target);
      topRef.current?.scrollIntoView({ behavior: 'smooth' });
    }
  }

  function handleResume(resume) {
    if (!resume) {
      setPage(0);
      setAnswers({});
      setCompleted(false);
    }
    setShowResume(false);
  }

  function handleReset() {
    localStorage.removeItem(STORAGE_KEY);
    setPage(0);
    setAnswers({});
    setCompleted(false);
  }

  // Resume dialog
  if (showResume) {
    return (
      <div className="min-h-screen flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full text-center fade-in">
          <div className="text-4xl mb-4">🔄</div>
          <h2 className="text-xl font-bold mb-2">Você tem respostas salvas</h2>
          <p className="text-sm text-gray-500 mb-6">
            Encontramos suas respostas anteriores. Deseja continuar de onde parou ou começar do zero?
          </p>
          <div className="space-y-3">
            <button onClick={() => handleResume(true)} className="w-full py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition">
              Continuar de onde parei
            </button>
            <button onClick={() => handleResume(false)} className="w-full py-3 rounded-xl bg-gray-100 text-gray-600 font-medium hover:bg-gray-200 transition">
              Começar do zero
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Thank you screen
  if (completed) {
    const totalAnswered = Object.keys(answers).filter(k => k !== 'ROUTE' && answers[k] !== undefined && answers[k] !== null && answers[k] !== '').length;
    return (
      <div className="min-h-screen flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full text-center fade-in">
          <div className="text-5xl mb-4">🎉</div>
          <h2 className="text-2xl font-bold mb-2">Obrigado!</h2>
          <p className="text-sm text-gray-500 mb-4">
            Suas {totalAnswered} respostas foram salvas com sucesso.
          </p>
          <p className="text-xs text-gray-400 mb-6">
            Seus dados são confidenciais e serão usados exclusivamente para mapear a maturidade em IA da Swift e personalizar o programa de capacitação.
          </p>
          <div className="bg-blue-50 rounded-xl p-4 mb-6">
            <p className="text-sm text-blue-700 font-medium">Programa de Transformação em IA</p>
            <p className="text-xs text-blue-500 mt-1">Swift × IONIX</p>
          </div>
          <button onClick={handleReset} className="text-xs text-gray-400 hover:text-gray-600 transition underline">
            Refazer pesquisa
          </button>
        </div>
      </div>
    );
  }

  const visibleQuestions = getVisibleQuestions();
  const canProceed = isPageComplete();

  // Count answered questions for progress
  const totalQuestionsAll = activePages.reduce((acc, p) => acc + p.perguntas.filter(q => q.id !== 'ROUTE').length, 0);
  const answeredCount = Object.keys(answers).filter(k => k !== 'ROUTE' && answers[k] !== undefined && answers[k] !== null && answers[k] !== '').length;

  return (
    <div className="min-h-screen pb-32">
      <div ref={topRef}/>

      {/* Header */}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div className="max-w-2xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between mb-2">
            <div>
              <h1 className="text-sm font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                Pesquisa de Maturidade em IA
              </h1>
              <p className="text-[10px] text-gray-400">Swift × IONIX</p>
            </div>
            <div className="text-xs text-gray-400 text-right">
              <span className="font-bold text-gray-600">{page + 1}</span>/{totalPages}
            </div>
          </div>
          <ProgressBar current={page + 1} total={totalPages}/>
        </div>
      </header>

      {/* Page Content */}
      <main className="max-w-2xl mx-auto px-4 py-6">
        <div key={currentPage.id} className="fade-in">
          {/* Welcome page */}
          {currentPage.isWelcome ? (
          <div className="text-center py-8 space-y-6">
            <div className="text-5xl">👋</div>
            <h2 className="text-2xl font-bold text-gray-900">Bem-vindo(a)!</h2>
            <p className="text-sm text-gray-600 max-w-md mx-auto leading-relaxed">
              Esta pesquisa vai nos ajudar a <strong>mapear como a Swift usa IA</strong> para personalizar o programa de capacitação ao seu contexto real.
            </p>
            <div className="grid grid-cols-3 gap-3 max-w-sm mx-auto">
              <div className="bg-blue-50 rounded-xl p-3 text-center">
                <div className="text-xl font-bold text-blue-600">~8 min</div>
                <div className="text-[10px] text-blue-500 mt-0.5">tempo estimado</div>
              </div>
              <div className="bg-purple-50 rounded-xl p-3 text-center">
                <div className="text-xl font-bold text-purple-600">100%</div>
                <div className="text-[10px] text-purple-500 mt-0.5">confidencial</div>
              </div>
              <div className="bg-emerald-50 rounded-xl p-3 text-center">
                <div className="text-xl font-bold text-emerald-600">individual</div>
                <div className="text-[10px] text-emerald-500 mt-0.5">sem respostas certas</div>
              </div>
            </div>
            <p className="text-xs text-gray-400 max-w-sm mx-auto">
              Suas respostas serão usadas exclusivamente para o programa de transformação em IA da Swift. O CPF serve apenas para cruzamento com dados de RH — nenhuma resposta será associada ao seu nome.
            </p>
          </div>
          ) : (
          <>
          {/* Page header */}
          <div className="mb-6">
            <div className="flex items-center gap-3 mb-2">
              <div className="text-3xl">{currentPage.icon}</div>
              <div>
                <h2 className="text-lg font-bold text-gray-900">{currentPage.titulo}</h2>
                <p className="text-sm text-gray-500">{currentPage.subtitulo}</p>
              </div>
            </div>
            {visibleQuestions.length > 0 && (
            <div className="flex items-center gap-2 mt-2">
              <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{ backgroundColor: currentPage.cor + '15', color: currentPage.cor }}>
                {visibleQuestions.length} {visibleQuestions.length === 1 ? 'pergunta' : 'perguntas'}
              </span>
            </div>
            )}
          </div>

          {/* Questions */}
          <div className="space-y-4">
            {currentPage.perguntas.map(p => (
              <QuestionCard
                key={p.id}
                pergunta={p}
                answer={answers[p.id]}
                onAnswer={handleAnswer}
                visible={isQuestionVisible(p)}
              />
            ))}
          </div>
          </>
          )}
        </div>
      </main>

      {/* Footer Navigation */}
      <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-lg z-40">
        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
          <button
            onClick={goPrev}
            disabled={page === 0}
            className={`px-5 py-2.5 rounded-xl text-sm font-medium transition-all ${
              page === 0
                ? 'text-gray-300 cursor-not-allowed'
                : 'text-gray-600 bg-gray-100 hover:bg-gray-200'
            }`}
          >
            Voltar
          </button>

          <div className="text-xs text-center max-w-[160px]">
            {!canProceed && answeredCount > 0 ? (
              <span className="text-amber-600 font-medium">Responda todas as perguntas para avançar</span>
            ) : (
              <span className="text-gray-400">{answeredCount} respondidas</span>
            )}
          </div>

          <button
            onClick={goNext}
            disabled={!canProceed}
            className={`px-6 py-2.5 rounded-xl text-sm font-semibold transition-all ${
              canProceed
                ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-md hover:shadow-lg'
                : 'bg-gray-200 text-gray-400 cursor-not-allowed'
            }`}
          >
            {page === totalPages - 1 ? 'Finalizar' : currentPage.isWelcome ? 'Começar' : 'Próximo'}
          </button>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
